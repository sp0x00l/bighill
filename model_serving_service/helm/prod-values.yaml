replicaCount: 1
image:
  repository: "385800116362.dkr.ecr.eu-west-1.amazonaws.com/bighill/mlops"
  tag: "model-serving-service-0.0.1-prod"
  pullPolicy: Always
service:
  type: ClusterIP
  healthPort: 5061
env:
  environment: "prod"
  backend: "kubernetes"
  vllmImage: "vllm/vllm-openai:latest"
  vllmMultiTenantEnabled: "true"
  vllmRequestTimeoutMs: "5000"
  localOllamaEndpoint: ""
  localArtifactCacheDir: "/tmp/bighill/model_serving_artifacts"
  localS3StorageDir: ""
  ggufInspectorCommand: "python3 -m bighill_model_artifacts.gguf"
  localOllamaCreateTimeoutSeconds: "1200"
