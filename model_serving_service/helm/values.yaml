replicaCount: 1
image:
  repository: "model-serving-service"
  tag: "0.0.1"
  pullPolicy: IfNotPresent
serviceAccount:
  create: true
  name: "model-serving-service"
  annotations: {}
rbac:
  create: true
crd:
  create: true
service:
  type: ClusterIP
  healthPort: 5061
lifecycle:
  terminationGracePeriodSeconds: 45
  readinessTimeoutSeconds: "30"
  drainTimeoutSeconds: "30"
  closeTimeoutSeconds: "10"
env:
  environment: "local-dev"
  serviceName: "model-serving-service"
  otelExporterEndpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  backend: "kubernetes"
  localStorePath: "/tmp/bighill/local_served_models/served_models.json"
  pollMs: "1000"
  servedModelCrdGroup: "serving.bighill.io"
  servedModelCrdVersion: "v1alpha1"
  servedModelCrdResource: "servedmodels"
  baseRuntimeCrdGroup: "serving.bighill.io"
  baseRuntimeCrdVersion: "v1alpha1"
  baseRuntimeCrdResource: "baseruntimes"
  healthcheckCpuThreshold: "80"
  healthcheckFreeMemThreshold: "20"
  healthcheckServiceLatencyThreshold: "5"
  healthcheckControllerMaxSilence: "30"
  vllmImage: "vllm/vllm-openai:latest"
  vllmImagePullPolicy: "IfNotPresent"
  vllmServiceAccount: ""
  vllmForceDedicatedAdapters: "false"
  vllmMaxLoras: "8"
  vllmMaxLoraRank: "16"
  vllmReplicas: "1"
  vllmPort: "8000"
  vllmCpu: "1"
  vllmMemory: "4Gi"
  vllmGpuResource: "nvidia.com/gpu"
  vllmGpu: "1"
  vllmRequestTimeoutMs: "5000"
  localOllamaEndpoint: "http://localhost:11434"
  localArtifactCacheDir: "/tmp/bighill/model_serving_artifacts"
  localS3StorageDir: ""
  ggufInspectorCommand: "python3 -m bighill_model_artifacts.gguf"
  localOllamaCreateTimeoutSeconds: "1200"
resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "512Mi"
    cpu: "300m"
