{{- if .Values.crd.create }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: servedmodels.serving.bighill.io
spec:
  group: serving.bighill.io
  names:
    kind: ServedModel
    listKind: ServedModelList
    plural: servedmodels
    singular: servedmodel
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - modelID
                - baseModel
                - adapterURI
              properties:
                modelID:
                  type: string
                orgID:
                  type: string
                trainingRunID:
                  type: string
                datasetID:
                  type: string
                name:
                  type: string
                modelVersion:
                  type: integer
                baseModel:
                  type: string
                artifactLocation:
                  type: string
                artifactFormat:
                  type: string
                artifactChecksum:
                  type: string
                adapterURI:
                  type: string
                adapterRank:
                  type: integer
                runtimeIsolation:
                  type: string
                  enum: ["", "SHARED", "DEDICATED"]
                pinned:
                  type: boolean
                servingTarget:
                  type: string
                servingModel:
                  type: string
            status:
              type: object
              properties:
                servingLoadStatus:
                  type: string
                  enum: ["NOT_LOADED", "LOADED", "FAILED"]
                servingTarget:
                  type: string
                servingModel:
                  type: string
                failureReason:
                  type: string
                observedGeneration:
                  type: integer
                  format: int64
                readyReplicas:
                  type: integer
{{- end }}
