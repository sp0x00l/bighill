apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "model-serving-service.fullname" . }}
  labels:
    app: {{ include "model-serving-service.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "model-serving-service.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "model-serving-service.fullname" . }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.lifecycle.terminationGracePeriodSeconds | default 45 }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default (include "model-serving-service.fullname" .) }}
      {{- end }}
      containers:
        - name: {{ include "model-serving-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: {{ .Values.env.environment | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.otelExporterEndpoint | quote }}
            - name: MODEL_SERVING_SERVICE_NAME
              value: {{ .Values.env.serviceName | quote }}
            - name: MODEL_SERVING_SERVICE_BUILD_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: MODEL_SERVING_SERVICE_LIFECYCLE_READINESS_TIMEOUT_SECONDS
              value: {{ .Values.lifecycle.readinessTimeoutSeconds | quote }}
            - name: MODEL_SERVING_SERVICE_LIFECYCLE_DRAIN_TIMEOUT_SECONDS
              value: {{ .Values.lifecycle.drainTimeoutSeconds | quote }}
            - name: MODEL_SERVING_SERVICE_LIFECYCLE_CLOSE_TIMEOUT_SECONDS
              value: {{ .Values.lifecycle.closeTimeoutSeconds | quote }}
            - name: MODEL_SERVING_SERVICE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MODEL_SERVING_SERVICE_HEALTHCHECK_CPU_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckCpuThreshold | quote }}
            - name: MODEL_SERVING_SERVICE_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckFreeMemThreshold | quote }}
            - name: MODEL_SERVING_SERVICE_HEALTHCHECK_PORT
              value: {{ .Values.service.healthPort | quote }}
            - name: MODEL_SERVING_SERVICE_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckServiceLatencyThreshold | quote }}
            - name: MODEL_SERVING_SERVICE_HEALTHCHECK_CONTROLLER_MAX_SILENCE_SECONDS
              value: {{ .Values.env.healthcheckControllerMaxSilence | quote }}
            - name: MODEL_SERVING_SERVICE_POLL_MS
              value: {{ .Values.env.pollMs | quote }}
            - name: MODEL_SERVING_SERVICE_BACKEND
              value: {{ .Values.env.backend | quote }}
            - name: MODEL_SERVING_SERVICE_LOCAL_STORE_PATH
              value: {{ .Values.env.localStorePath | quote }}
            - name: MODEL_SERVING_SERVICE_SERVED_MODEL_CRD_GROUP
              value: {{ .Values.env.servedModelCrdGroup | quote }}
            - name: MODEL_SERVING_SERVICE_SERVED_MODEL_CRD_VERSION
              value: {{ .Values.env.servedModelCrdVersion | quote }}
            - name: MODEL_SERVING_SERVICE_SERVED_MODEL_CRD_RESOURCE
              value: {{ .Values.env.servedModelCrdResource | quote }}
            - name: MODEL_SERVING_SERVICE_VLLM_IMAGE
              value: {{ .Values.env.vllmImage | quote }}
            - name: MODEL_SERVING_SERVICE_VLLM_IMAGE_PULL_POLICY
              value: {{ .Values.env.vllmImagePullPolicy | quote }}
            - name: MODEL_SERVING_SERVICE_VLLM_SERVICE_ACCOUNT
              value: {{ .Values.env.vllmServiceAccount | quote }}
            - name: MODEL_SERVING_SERVICE_VLLM_MULTI_TENANT_ENABLED
              value: {{ .Values.env.vllmMultiTenantEnabled | quote }}
            - name: MODEL_SERVING_SERVICE_VLLM_REPLICAS
              value: {{ .Values.env.vllmReplicas | quote }}
            - name: MODEL_SERVING_SERVICE_VLLM_PORT
              value: {{ .Values.env.vllmPort | quote }}
            - name: MODEL_SERVING_SERVICE_VLLM_CPU
              value: {{ .Values.env.vllmCpu | quote }}
            - name: MODEL_SERVING_SERVICE_VLLM_MEMORY
              value: {{ .Values.env.vllmMemory | quote }}
            - name: MODEL_SERVING_SERVICE_VLLM_GPU_RESOURCE
              value: {{ .Values.env.vllmGpuResource | quote }}
            - name: MODEL_SERVING_SERVICE_VLLM_GPU
              value: {{ .Values.env.vllmGpu | quote }}
            - name: MODEL_SERVING_SERVICE_VLLM_REQUEST_TIMEOUT_MS
              value: {{ .Values.env.vllmRequestTimeoutMs | quote }}
            - name: MODEL_SERVING_SERVICE_LOCAL_OLLAMA_ENDPOINT
              value: {{ .Values.env.localOllamaEndpoint | quote }}
            - name: MODEL_SERVING_SERVICE_LOCAL_ARTIFACT_CACHE_DIR
              value: {{ .Values.env.localArtifactCacheDir | quote }}
            - name: MODEL_SERVING_SERVICE_GGUF_INSPECTOR_COMMAND
              value: {{ .Values.env.ggufInspectorCommand | quote }}
            - name: MODEL_SERVING_SERVICE_LOCAL_OLLAMA_CREATE_TIMEOUT_SECONDS
              value: {{ .Values.env.localOllamaCreateTimeoutSeconds | quote }}
            - name: BIGHILL_LOCAL_S3_STORAGE_DIR
              value: {{ .Values.env.localS3StorageDir | quote }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}
          startupProbe:
            httpGet:
              path: /live
              port: health
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /live
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            periodSeconds: 10
            failureThreshold: 3
