{{- if .Values.crd.create }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: baseruntimes.serving.bighill.io
spec:
  group: serving.bighill.io
  names:
    kind: BaseRuntime
    listKind: BaseRuntimeList
    plural: baseruntimes
    singular: baseruntime
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - baseModel
                - poolKey
                - maxLoras
                - maxLoraRank
              properties:
                baseModel:
                  type: string
                poolKey:
                  type: string
                maxLoras:
                  type: integer
                maxLoraRank:
                  type: integer
                gpu:
                  type: string
                image:
                  type: string
            status:
              type: object
              properties:
                endpoint:
                  type: string
                phase:
                  type: string
                readyReplicas:
                  type: integer
                loadedAdapters:
                  type: array
                  items:
                    type: object
                    properties:
                      servingModel:
                        type: string
                      servedModelResourceName:
                        type: string
                      modelID:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastUsedAt:
                        type: string
                        format: date-time
                      pinned:
                        type: boolean
{{- end }}
