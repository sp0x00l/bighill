replicaCount: 1
image:
  repository: "385800116362.dkr.ecr.eu-west-1.amazonaws.com/bighill/mlops/model-registry-service"
  tag: "0.0.1"
  pullPolicy: Always
service:
  type: ClusterIP
  httpPort: 8084
  healthPort: 5060
env:
  environment: "staging"
  pgHost: "postgres.ml-ops-staging.svc.cluster.local"
  pgPort: "5432"
  pgSslMode: "require"
  kafkaBroker: "kafka:9092"
  kafkaBaseGroupId: "model-registry"
  kafkaAutoOffsetReset: "earliest"
  topic: "model_registry"
  trainingSubscriberTopic: "training"
  ingestionSubscriberTopic: "ingestion"
  dlq: "https://sqs.eu-west-1.amazonaws.com/385800116362/bighill-staging-model-registry-dlq"
  outbox: "postgres"
  outboxRelayPollMs: "250"
  outboxRelayBatchSize: "100"
  outboxRelayFailureBackoffMs: "2000"
  servingBackend: "kubernetes"
