services:
  oracle-data-source:
    image: container-registry.oracle.com/database/express:latest
    container_name: oracle-xe
    platform: linux/amd64 
    restart: always
    ports:
      - "1521:1521"   
      - "5500:5500"   
    environment:
      ORACLE_PWD: 'password'
    volumes:
      - oracle-vol:/opt/bighill/data/oracle

volumes:
  oracle-vol:
