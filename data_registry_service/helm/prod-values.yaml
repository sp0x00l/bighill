image:
  repository: 385800116362.dkr.ecr.eu-west-1.amazonaws.com/bighill/mlops
  tag: "data-registry-service-0.0.1-prod"
  pullPolicy: Always

serviceAccount:
  create: true
  name: "data-registry-service"
  annotations: {}

ingress:
  enabled: true
  host: "data-registry.internal.bighill.example"

env:
  environment: "prod"
  kafkaBroker: "kafka:9092"
  dlq: "https://sqs.eu-west-1.amazonaws.com/385800116362/bighill-prod-data-registry-dlq"
  outbox: "postgres"
  outboxRelayPollMs: "250"
  outboxRelayBatchSize: "100"
  outboxRelayFailureBackoffMs: "2000"
  catalogProvider: "polaris"
  otelExporterEndpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  dbCredentialsSecret:
    name: "aurora-creds-prod"
    userKey: "bighill_data_registry_db_user"
    passwordKey: "bighill_data_registry_db_password"
    hostKey: "pg_host"
    portKey: "pg_port"
    sslmodeKey: "pg_sslmode"
    nameKey: "bighill_data_registry_db"
