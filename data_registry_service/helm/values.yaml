replicaCount: 1
image:
  repository: "data-registry-service"
  tag: "0.0.1"
  pullPolicy: IfNotPresent
serviceAccount:
  create: false
  name: "data-registry-service"
  annotations: {}
service:
  type: ClusterIP
  httpPort: 8081
  grpcPort: 7071
  healthPort: 5051
ingress:
  enabled: false
  host: ""
  certificateArn: ""
env:
  environment: "local-dev"
  serviceName: "data-registry-service"
  otelExporterEndpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  kafkaBroker: "kafka:9092"
  kafkaGroupId: "data-registry-group"
  topic: "data_registry"
  featureMaterializerSubscriberTopic: "feature_materializer"
  dlq: "http://localhost:4566/data-registry-dev-env-queue/"
  outbox: "postgres"
  outboxRelayPollMs: "250"
  outboxRelayBatchSize: "100"
  outboxRelayFailureBackoffMs: "2000"
  dbCredentialsSecret:
    name: ""
    userKey: "bighill_data_registry_db_user"
    passwordKey: "bighill_data_registry_db_password"
    hostKey: "pg_host"
    portKey: "pg_port"
    sslmodeKey: "pg_sslmode"
    nameKey: "bighill_data_registry_db"
  dbCredentialsExternalSecret:
    enabled: false
    targetSecretName: ""
    refreshInterval: "1h"
    secretStoreRef:
      name: ""
      kind: "SecretStore"
    remoteKeys:
      user: ""
      password: ""
      name: ""
      host: ""
      port: ""
      sslmode: ""
  dbName: "bighill_data_registry_db"
  dbUser: "bighill_data_registry_db_user"
  dbPassword: ""
  dbMaxConnections: "20"
  sharedLibDbStatementTimeoutMs: "15000"
  sharedLibDbLockTimeoutMs: "5000"
  sharedLibDbIdleInTxTimeoutMs: "10000"
  pgHost: "localhost"
  pgPort: "5432"
  pgSslMode: "require"
  healthcheckCpuThreshold: "80"
  healthcheckFreeMemThreshold: "20"
  healthcheckServiceLatencyThreshold: "5"
  healthcheckDbLatencyThreshold: "5"
  healthcheckMessageBrokerLatencyThreshold: "5"
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "768Mi"
    cpu: "400m"
