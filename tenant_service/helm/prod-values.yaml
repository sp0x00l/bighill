image:
  repository: 385800116362.dkr.ecr.eu-west-1.amazonaws.com/bighill/mlops
  tag: "tenant-service-0.0.1-prod"
  pullPolicy: Always

serviceAccount:
  create: true
  name: "tenant-service"
  annotations: {}

ingress:
  enabled: true
  host: "tenant.internal.bighill.example"

env:
  environment: "prod"
  kafkaBroker: "kafka:9092"
  redisAddress: "redis:6379"
  dlq: "https://sqs.eu-west-1.amazonaws.com/385800116362/bighill-prod-profile-dlq"
  outbox: "postgres"
  authKmsKeyId: "alias/bighill-prod-jwt-signing"
  emailValidationTtlMinutes: "60"
  otelExporterEndpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  dbCredentialsSecret:
    name: "aurora-creds-prod"
    userKey: "bighill_tenant_db_user"
    passwordKey: "bighill_tenant_db_password"
    hostKey: "pg_host"
    portKey: "pg_port"
    sslmodeKey: "pg_sslmode"
    nameKey: "bighill_tenant_db"
  oauthCredentialsSecret:
    name: "profile-oauth-creds-prod"
    googleClientIdKey: "google_client_id"
    googleClientSecretKey: "google_client_secret"
    discordClientIdKey: "discord_client_id"
    discordClientSecretKey: "discord_client_secret"
