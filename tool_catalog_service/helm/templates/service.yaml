apiVersion: v1
kind: Service
metadata:
  name: {{ include "tool-catalog-service.fullname" . }}
  labels:
    app: {{ include "tool-catalog-service.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: health
      port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
  selector:
    app: {{ include "tool-catalog-service.fullname" . }}
