replicaCount: 1
image:
  repository: "feature-materializer-service"
  tag: "0.0.1"
  pullPolicy: IfNotPresent
serviceAccount:
  create: false
  name: "feature-materializer-service"
  annotations: {}
service:
  type: ClusterIP
  healthPort: 5057
  grpcPort: 7072
env:
  environment: "local-dev"
  serviceName: "feature-materializer-service"
  otelExporterEndpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  kafkaBroker: "kafka:9092"
  kafkaBaseGroupId: "feature-materializer"
  kafkaAutoOffsetReset: "earliest"
  topic: "feature_materializer"
  ingestionSubscriberTopic: "ingestion"
  dataRegistrySubscriberTopic: "data_registry"
  profileSubscriberTopic: "profile"
  dlq: "http://localhost:4566/feature-materializer-dev-env-queue/"
  outbox: "postgres"
  outboxRelayPollMs: "250"
  outboxRelayBatchSize: "100"
  outboxRelayFailureBackoffMs: "2000"
  temporalAddress: "temporal:7233"
  temporalNamespace: "default"
  temporalTaskQueue: "feature-materializer-service"
  artifactBucketName: "local-dev-bucket"
  artifactBucketRegion: "local-dev"
  artifactUploadPartSizeMb: "10"
  embeddingProvider: "deterministic"
  embeddingUrl: ""
  embeddingModel: "bge-small-en-v1.5"
  embeddingDimensions: "384"
  embeddingMaxRows: "1000"
  embeddingStrategyVersion: "rag-v1"
  extractorName: "go-document-extractor-suite"
  extractorVersion: "v1"
  cleanerName: "go-basic-text-cleaner"
  cleanerVersion: "v1"
  embeddingChunkerName: "go-token-window"
  embeddingChunkerVersion: "v1"
  embeddingChunkSize: "384"
  embeddingChunkOverlap: "64"
  embeddingRequestTimeoutSeconds: "30"
  dataStreamGrpcAddress: "data-stream-service:7070"
  dataStreamRequestTimeoutSeconds: "60"
  dataStreamAuthToken: ""
  dataStreamInsecure: "true"
  dataStreamTlsServerName: ""
  dataStreamTlsCaCertPath: ""
  dataStreamTlsClientCertPath: ""
  dataStreamTlsClientKeyPath: ""
  dbCredentialsSecret:
    name: ""
    userKey: "bighill_feature_materializer_db_user"
    passwordKey: "bighill_feature_materializer_db_password"
    hostKey: "pg_host"
    portKey: "pg_port"
    sslmodeKey: "pg_sslmode"
    nameKey: "bighill_feature_materializer_db"
  dbCredentialsExternalSecret:
    enabled: false
    targetSecretName: ""
    refreshInterval: "1h"
    secretStoreRef:
      name: ""
      kind: "SecretStore"
    remoteKeys:
      user: ""
      password: ""
      name: ""
      host: ""
      port: ""
      sslmode: ""
  dbHost: "postgres"
  dbPort: "5432"
  dbName: "bighill_feature_materializer_db"
  dbUser: "bighill_feature_materializer_db_user"
  dbPassword: ""
  dbMaxConnections: "20"
  dbSslMode: "require"
  healthcheckCpuThreshold: "80"
  healthcheckFreeMemThreshold: "20"
  healthcheckServiceLatencyThreshold: "5"
  healthcheckDbLatencyThreshold: "5"
  healthcheckMessageBrokerLatencyThreshold: "5"
  healthcheckMessageBrokerSubscriberMaxPollSilence: "30"
  healthcheckMessageBrokerSubscriberMaxProgressSilence: "90"
  healthcheckMessageBrokerSubscriberMaxLag: "100000"
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "768Mi"
    cpu: "400m"
