apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "feature-materializer-service.fullname" . }}-test-connection"
  labels:
    app: {{ include "feature-materializer-service.fullname" . }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl
      command: ["curl"]
      args: ["http://{{ include "feature-materializer-service.fullname" . }}:{{ .Values.service.healthPort }}/health"]
  restartPolicy: Never
