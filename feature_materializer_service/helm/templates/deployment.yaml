apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "feature-materializer-service.fullname" . }}
  labels:
    app: {{ include "feature-materializer-service.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "feature-materializer-service.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "feature-materializer-service.fullname" . }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.lifecycle.terminationGracePeriodSeconds | default 45 }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default "feature-materializer-service" }}
      {{- end }}
      containers:
        - name: {{ include "feature-materializer-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: {{ .Values.env.environment | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.otelExporterEndpoint | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_NAME
              value: {{ .Values.env.serviceName | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_BUILD_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_LIFECYCLE_READINESS_TIMEOUT_SECONDS
              value: {{ .Values.lifecycle.readinessTimeoutSeconds | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_LIFECYCLE_DRAIN_TIMEOUT_SECONDS
              value: {{ .Values.lifecycle.drainTimeoutSeconds | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_LIFECYCLE_CLOSE_TIMEOUT_SECONDS
              value: {{ .Values.lifecycle.closeTimeoutSeconds | quote }}
            - name: KAFKA_BROKER
              value: {{ .Values.env.kafkaBroker | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_KAFKA_BASE_GROUP_ID
              value: {{ .Values.env.kafkaBaseGroupId | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_KAFKA_AUTO_OFFSET_RESET
              value: {{ .Values.env.kafkaAutoOffsetReset | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_TOPIC
              value: {{ .Values.env.topic | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_INGESTION_SUBSCRIBER_TOPIC
              value: {{ .Values.env.ingestionSubscriberTopic | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DATA_REGISTRY_SUBSCRIBER_TOPIC
              value: {{ .Values.env.dataRegistrySubscriberTopic | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_TENANT_SUBSCRIBER_TOPIC
              value: {{ .Values.env.tenantSubscriberTopic | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DLQ
              value: {{ .Values.env.dlq | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_OUTBOX
              value: {{ .Values.env.outbox | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_OUTBOX_RELAY_POLL_MS
              value: {{ .Values.env.outboxRelayPollMs | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_OUTBOX_RELAY_BATCH_SIZE
              value: {{ .Values.env.outboxRelayBatchSize | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS
              value: {{ .Values.env.outboxRelayFailureBackoffMs | quote }}
            - name: USER_EVENTS_ENABLED
              value: {{ .Values.env.userEventsEnabled | quote }}
            - name: USER_EVENTS_REDIS_ADDRESS
              value: {{ .Values.env.userEventsRedisAddress | quote }}
            - name: USER_EVENTS_REDIS_USERNAME
              value: {{ .Values.env.userEventsRedisUsername | quote }}
            - name: USER_EVENTS_REDIS_PASSWORD
              value: {{ .Values.env.userEventsRedisPassword | quote }}
            - name: USER_EVENTS_REDIS_TLS
              value: {{ .Values.env.userEventsRedisTLS | quote }}
            - name: USER_EVENTS_CHANNEL_PREFIX
              value: {{ .Values.env.userEventsChannelPrefix | quote }}
            - name: USER_EVENTS_PUBLISH_TIMEOUT_MS
              value: {{ .Values.env.userEventsPublishTimeoutMs | quote }}
            - name: USER_EVENTS_STREAM_MAX_LEN
              value: {{ .Values.env.userEventsStreamMaxLen | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_TEMPORAL_ADDRESS
              value: {{ .Values.env.temporalAddress | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_TEMPORAL_NAMESPACE
              value: {{ .Values.env.temporalNamespace | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_TEMPORAL_TASK_QUEUE
              value: {{ .Values.env.temporalTaskQueue | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_TEMPORAL_CONNECT_TIMEOUT_SECONDS
              value: {{ .Values.env.temporalConnectTimeoutSeconds | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_TEMPORAL_CONNECT_RETRY_INTERVAL_SECONDS
              value: {{ .Values.env.temporalConnectRetryIntervalSeconds | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_ARTIFACT_BUCKET_NAME
              value: {{ .Values.env.artifactBucketName | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_ARTIFACT_BUCKET_REGION
              value: {{ .Values.env.artifactBucketRegion | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_ARTIFACT_UPLOAD_PART_SIZE_MB
              value: {{ .Values.env.artifactUploadPartSizeMb | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_PROVIDER
              value: {{ .Values.env.embeddingProvider | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_URL
              value: {{ .Values.env.embeddingUrl | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_MODEL
              value: {{ .Values.env.embeddingModel | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_DIMENSIONS
              value: {{ .Values.env.embeddingDimensions | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_MAX_ROWS
              value: {{ .Values.env.embeddingMaxRows | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_VECTOR_STORE
              value: {{ .Values.env.embeddingVectorStore | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_STRATEGY_VERSION
              value: {{ .Values.env.embeddingStrategyVersion | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EXTRACTOR_NAME
              value: {{ .Values.env.extractorName | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EXTRACTOR_VERSION
              value: {{ .Values.env.extractorVersion | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_CLEANER_NAME
              value: {{ .Values.env.cleanerName | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_CLEANER_VERSION
              value: {{ .Values.env.cleanerVersion | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_CHUNKER_NAME
              value: {{ .Values.env.embeddingChunkerName | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_CHUNKER_VERSION
              value: {{ .Values.env.embeddingChunkerVersion | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_CHUNK_SIZE
              value: {{ .Values.env.embeddingChunkSize | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_CHUNK_OVERLAP
              value: {{ .Values.env.embeddingChunkOverlap | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.env.embeddingRequestTimeoutSeconds | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_GRAPH_ENABLED
              value: {{ .Values.env.graphEnabled | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTOR
              value: {{ .Values.env.graphExtractor | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTION_ENDPOINT
              value: {{ .Values.env.graphExtractionEndpoint | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTION_AUTH_TOKEN
{{- if .Values.env.graphExtractionAuthTokenSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.graphExtractionAuthTokenSecret.name | quote }}
                  key: {{ .Values.env.graphExtractionAuthTokenSecret.key | quote }}
{{- else }}
              value: {{ .Values.env.graphExtractionAuthToken | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTION_MODEL
              value: {{ .Values.env.graphExtractionModel | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTION_PROMPT_VERSION
              value: {{ .Values.env.graphExtractionPromptVersion | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTION_SCHEMA_VERSION
              value: {{ .Values.env.graphExtractionSchemaVersion | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTION_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.env.graphExtractionRequestTimeoutSeconds | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTION_MAX_RESPONSE_BYTES
              value: {{ .Values.env.graphExtractionMaxResponseBytes | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTION_MAX_OUTPUT_TOKENS
              value: {{ .Values.env.graphExtractionMaxOutputTokens | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTION_MAX_RETRIES
              value: {{ .Values.env.graphExtractionMaxRetries | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DATA_STREAM_GRPC_ADDRESS
              value: {{ .Values.env.dataStreamGrpcAddress | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DATA_STREAM_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.env.dataStreamRequestTimeoutSeconds | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DATA_STREAM_AUTH_TOKEN
              value: {{ .Values.env.dataStreamAuthToken | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DATA_STREAM_INSECURE
              value: {{ .Values.env.dataStreamInsecure | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DATA_STREAM_TLS_SERVER_NAME
              value: {{ .Values.env.dataStreamTlsServerName | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DATA_STREAM_TLS_CA_CERT_PATH
              value: {{ .Values.env.dataStreamTlsCaCertPath | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DATA_STREAM_TLS_CLIENT_CERT_PATH
              value: {{ .Values.env.dataStreamTlsClientCertPath | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DATA_STREAM_TLS_CLIENT_KEY_PATH
              value: {{ .Values.env.dataStreamTlsClientKeyPath | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_ICEBERG_WRITER_BINARY_PATH
              value: {{ .Values.env.icebergWriterBinaryPath | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_ICEBERG_WRITER_TIMEOUT_SECONDS
              value: {{ .Values.env.icebergWriterTimeoutSeconds | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_POLARIS_BASE_URL
              value: {{ .Values.env.polarisBaseUrl | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_POLARIS_CATALOG
              value: {{ .Values.env.polarisCatalog | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_POLARIS_WAREHOUSE
              value: {{ .Values.env.polarisWarehouse | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_POLARIS_CREDENTIAL
{{- if .Values.env.polarisCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.polarisCredentialsSecret.name }}
                  key: {{ .Values.env.polarisCredentialsSecret.credentialKey }}
{{- else }}
              value: {{ .Values.env.polarisCredential | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_POLARIS_TOKEN
{{- if .Values.env.polarisCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.polarisCredentialsSecret.name }}
                  key: {{ .Values.env.polarisCredentialsSecret.tokenKey }}
{{- else }}
              value: {{ .Values.env.polarisToken | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_POLARIS_SCOPE
              value: {{ .Values.env.polarisScope | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_POLARIS_STORAGE_ENDPOINT
              value: {{ .Values.env.polarisStorageEndpoint | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_POLARIS_STORAGE_ACCESS_KEY_ID
              value: {{ .Values.env.polarisStorageAccessKeyId | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_POLARIS_STORAGE_SECRET_ACCESS_KEY
              value: {{ .Values.env.polarisStorageSecretAccessKey | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_POLARIS_STORAGE_REGION
              value: {{ .Values.env.polarisStorageRegion | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_POLARIS_STORAGE_PATH_STYLE
              value: {{ .Values.env.polarisStoragePathStyle | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_HOST
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.hostKey }}
{{- else }}
              value: {{ .Values.env.dbHost | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_PORT
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.portKey }}
{{- else }}
              value: {{ .Values.env.dbPort | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_NAME
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.nameKey }}
{{- else }}
              value: {{ .Values.env.dbName | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_USER
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.userKey }}
{{- else }}
              value: {{ .Values.env.dbUser | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_PASSWORD
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.passwordKey }}
{{- else }}
              value: {{ .Values.env.dbPassword | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_MAX_CONNECTIONS
              value: {{ .Values.env.dbMaxConnections | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_SSLMODE
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.sslmodeKey }}
{{- else }}
              value: {{ .Values.env.dbSslMode | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_CPU_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckCpuThreshold | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckFreeMemThreshold | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_PORT
              value: {{ .Values.service.healthPort | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_API_GRPC_PORT
              value: {{ .Values.service.grpcPort | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckServiceLatencyThreshold | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckDbLatencyThreshold | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckMessageBrokerLatencyThreshold | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_POLL_SILENCE_SECONDS
              value: {{ .Values.env.healthcheckMessageBrokerSubscriberMaxPollSilence | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_PROGRESS_SILENCE_SECONDS
              value: {{ .Values.env.healthcheckMessageBrokerSubscriberMaxProgressSilence | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_LAG
              value: {{ .Values.env.healthcheckMessageBrokerSubscriberMaxLag | quote }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
