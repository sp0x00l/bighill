apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "feature-materializer-service.fullname" . }}
  labels:
    app: {{ include "feature-materializer-service.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "feature-materializer-service.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "feature-materializer-service.fullname" . }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default "feature-materializer-service" }}
      {{- end }}
      containers:
        - name: {{ include "feature-materializer-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: {{ .Values.env.environment | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.otelExporterEndpoint | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_NAME
              value: {{ .Values.env.serviceName | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_BUILD_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: KAFKA_BROKER
              value: {{ .Values.env.kafkaBroker | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_KAFKA_GROUP_ID
              value: {{ .Values.env.kafkaGroupId | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_TOPIC
              value: {{ .Values.env.topic | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DATA_INGESTION_SUBSCRIBER_TOPIC
              value: {{ .Values.env.dataIngestionSubscriberTopic | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DLQ
              value: {{ .Values.env.dlq | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_OUTBOX
              value: {{ .Values.env.outbox | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_OUTBOX_RELAY_POLL_MS
              value: {{ .Values.env.outboxRelayPollMs | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_OUTBOX_RELAY_BATCH_SIZE
              value: {{ .Values.env.outboxRelayBatchSize | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS
              value: {{ .Values.env.outboxRelayFailureBackoffMs | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_TEMPORAL_ADDRESS
              value: {{ .Values.env.temporalAddress | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_TEMPORAL_NAMESPACE
              value: {{ .Values.env.temporalNamespace | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_TEMPORAL_TASK_QUEUE
              value: {{ .Values.env.temporalTaskQueue | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_ARTIFACT_BUCKET_NAME
              value: {{ .Values.env.artifactBucketName | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_ARTIFACT_BUCKET_REGION
              value: {{ .Values.env.artifactBucketRegion | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_ARTIFACT_UPLOAD_PART_SIZE_MB
              value: {{ .Values.env.artifactUploadPartSizeMb | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_PROVIDER
              value: {{ .Values.env.embeddingProvider | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_URL
              value: {{ .Values.env.embeddingUrl | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_MODEL
              value: {{ .Values.env.embeddingModel | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_DIMENSIONS
              value: {{ .Values.env.embeddingDimensions | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_MAX_ROWS
              value: {{ .Values.env.embeddingMaxRows | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_STRATEGY_VERSION
              value: {{ .Values.env.embeddingStrategyVersion | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EXTRACTOR_NAME
              value: {{ .Values.env.extractorName | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EXTRACTOR_VERSION
              value: {{ .Values.env.extractorVersion | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_CLEANER_NAME
              value: {{ .Values.env.cleanerName | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_CLEANER_VERSION
              value: {{ .Values.env.cleanerVersion | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_CHUNKER_NAME
              value: {{ .Values.env.embeddingChunkerName | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_CHUNKER_VERSION
              value: {{ .Values.env.embeddingChunkerVersion | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_CHUNK_SIZE
              value: {{ .Values.env.embeddingChunkSize | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_CHUNK_OVERLAP
              value: {{ .Values.env.embeddingChunkOverlap | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_EMBEDDING_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.env.embeddingRequestTimeoutSeconds | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_HOST
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.hostKey }}
{{- else }}
              value: {{ .Values.env.dbHost | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_PORT
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.portKey }}
{{- else }}
              value: {{ .Values.env.dbPort | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_NAME
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.nameKey }}
{{- else }}
              value: {{ .Values.env.dbName | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_USER
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.userKey }}
{{- else }}
              value: {{ .Values.env.dbUser | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_PASSWORD
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.passwordKey }}
{{- else }}
              value: {{ .Values.env.dbPassword | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_MAX_CONNECTIONS
              value: {{ .Values.env.dbMaxConnections | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_DB_SSLMODE
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.sslmodeKey }}
{{- else }}
              value: {{ .Values.env.dbSslMode | quote }}
{{- end }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_CPU_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckCpuThreshold | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckFreeMemThreshold | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_PORT
              value: {{ .Values.service.healthPort | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_API_GRPC_PORT
              value: {{ .Values.service.grpcPort | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckServiceLatencyThreshold | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckDbLatencyThreshold | quote }}
            - name: FEATURE_MATERIALIZER_SERVICE_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckMessageBrokerLatencyThreshold | quote }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
