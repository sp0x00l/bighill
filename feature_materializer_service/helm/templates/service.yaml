apiVersion: v1
kind: Service
metadata:
  name: {{ include "feature-materializer-service.fullname" . }}
  labels:
    app: {{ include "feature-materializer-service.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "feature-materializer-service.fullname" . }}
  ports:
    - name: health
      port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
