replicaCount: 1
image:
  repository: "training-service"
  tag: "0.0.1"
  pullPolicy: IfNotPresent
serviceAccount:
  create: false
  name: "training-service"
  annotations: {}
service:
  type: ClusterIP
  healthPort: 5058
ingress:
  enabled: false
  host: ""
  certificateArn: ""
env:
  environment: "local-dev"
  serviceName: "training-service"
  otelExporterEndpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  temporalAddress: "temporal:7233"
  temporalNamespace: "default"
  temporalTaskQueue: "training-service"
  trainingTriggerEnabled: "false"
  kafkaBroker: "kafka:9092"
  kafkaGroupId: "training-group"
  topic: "training"
  dataRegistrySubscriberTopic: "data_registry"
  dlq: "http://localhost:4566/training-dev-env-queue/"
  baseModel: "local-dev-base-model"
  evaluationProfile: "smoke"
  trainingProfileName: "local-dev-qlora"
  trainingProfileTrainer: "sft"
  trainingProfileAdapter: "qlora"
  trainingProfileQuantization: "4bit"
  trainingProfilePreferenceDatasetUri: ""
  trainingProfileSequenceLength: "2048"
  trainingProfileSamplePacking: "true"
  trainingProfileLearningRate: "0.0002"
  trainingProfileEpochs: "3"
  trainingProfileMicroBatchSize: "1"
  trainingProfileGradientAccumulationSteps: "4"
  trainingProfileLoraR: "16"
  trainingProfileLoraAlpha: "32"
  executorProvider: "kuberay"
  rayJobsUrl: "http://ray-head:8265"
  rayTrainingEntrypoint: "python -m training_jobs.train"
  rayEvaluationEntrypoint: "python -m training_jobs.evaluate"
  axolotlCommand: "axolotl train"
  rayRequestTimeoutSeconds: "30"
  rayPollIntervalSeconds: "30"
  kubeRayNamespace: "default"
  kubeRayRayVersion: "2.46.0"
  kubeRayImage: "training-jobs:0.0.1"
  kubeRayImagePullPolicy: "IfNotPresent"
  kubeRayServiceAccount: "training-jobs"
  kubeRayTtlSecondsAfterFinished: "3600"
  kubeRayWorkerReplicas: "1"
  kubeRayCpu: "1"
  kubeRayMemory: "4Gi"
  kubeRayGpuResource: "nvidia.com/gpu"
  kubeRayGpu: "1"
  artifactBucketRegion: "local-dev"
  modelUriPrefix: "s3://local-dev-bucket/models"
  evaluationUriPrefix: "s3://local-dev-bucket/evaluations"
  servingTarget: ""
  servingModel: ""
  servingLoadStatus: "NOT_LOADED"
  healthcheckCpuThreshold: "80"
  healthcheckFreeMemThreshold: "20"
  healthcheckServiceLatencyThreshold: "5"
  healthcheckMessageBrokerLatencyThreshold: "5"
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "768Mi"
    cpu: "500m"
