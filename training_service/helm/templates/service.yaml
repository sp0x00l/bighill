apiVersion: v1
kind: Service
metadata:
  name: {{ include "training-service.fullname" . }}
  labels:
    app: {{ include "training-service.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: health
      port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
  selector:
    app: {{ include "training-service.fullname" . }}
