apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "training-service.fullname" . }}
  labels:
    app: {{ include "training-service.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "training-service.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "training-service.fullname" . }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default "training-service" }}
      {{- end }}
      containers:
        - name: {{ include "training-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: {{ .Values.env.environment | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.otelExporterEndpoint | quote }}
            - name: TRAINING_SERVICE_NAME
              value: {{ .Values.env.serviceName | quote }}
            - name: TRAINING_SERVICE_BUILD_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: TRAINING_SERVICE_TEMPORAL_ADDRESS
              value: {{ .Values.env.temporalAddress | quote }}
            - name: TRAINING_SERVICE_TEMPORAL_NAMESPACE
              value: {{ .Values.env.temporalNamespace | quote }}
            - name: TRAINING_SERVICE_TEMPORAL_TASK_QUEUE
              value: {{ .Values.env.temporalTaskQueue | quote }}
            - name: TRAINING_SERVICE_TRAINING_TRIGGER_ENABLED
              value: {{ .Values.env.trainingTriggerEnabled | quote }}
            - name: KAFKA_BROKER
              value: {{ .Values.env.kafkaBroker | quote }}
            - name: TRAINING_SERVICE_KAFKA_GROUP_ID
              value: {{ .Values.env.kafkaGroupId | quote }}
            - name: TRAINING_SERVICE_TOPIC
              value: {{ .Values.env.topic | quote }}
            - name: TRAINING_SERVICE_DATA_REGISTRY_SUBSCRIBER_TOPIC
              value: {{ .Values.env.dataRegistrySubscriberTopic | quote }}
            - name: TRAINING_SERVICE_DLQ
              value: {{ .Values.env.dlq | quote }}
            - name: TRAINING_SERVICE_BASE_MODEL
              value: {{ .Values.env.baseModel | quote }}
            - name: TRAINING_SERVICE_EVALUATION_PROFILE
              value: {{ .Values.env.evaluationProfile | quote }}
            - name: TRAINING_SERVICE_TRAINING_PROFILE_NAME
              value: {{ .Values.env.trainingProfileName | quote }}
            - name: TRAINING_SERVICE_TRAINING_PROFILE_TRAINER
              value: {{ .Values.env.trainingProfileTrainer | quote }}
            - name: TRAINING_SERVICE_TRAINING_PROFILE_ADAPTER
              value: {{ .Values.env.trainingProfileAdapter | quote }}
            - name: TRAINING_SERVICE_TRAINING_PROFILE_QUANTIZATION
              value: {{ .Values.env.trainingProfileQuantization | quote }}
            - name: TRAINING_SERVICE_TRAINING_PROFILE_PREFERENCE_DATASET_URI
              value: {{ .Values.env.trainingProfilePreferenceDatasetUri | quote }}
            - name: TRAINING_SERVICE_TRAINING_PROFILE_SEQUENCE_LENGTH
              value: {{ .Values.env.trainingProfileSequenceLength | quote }}
            - name: TRAINING_SERVICE_TRAINING_PROFILE_SAMPLE_PACKING
              value: {{ .Values.env.trainingProfileSamplePacking | quote }}
            - name: TRAINING_SERVICE_TRAINING_PROFILE_LEARNING_RATE
              value: {{ .Values.env.trainingProfileLearningRate | quote }}
            - name: TRAINING_SERVICE_TRAINING_PROFILE_EPOCHS
              value: {{ .Values.env.trainingProfileEpochs | quote }}
            - name: TRAINING_SERVICE_TRAINING_PROFILE_MICRO_BATCH_SIZE
              value: {{ .Values.env.trainingProfileMicroBatchSize | quote }}
            - name: TRAINING_SERVICE_TRAINING_PROFILE_GRADIENT_ACCUMULATION_STEPS
              value: {{ .Values.env.trainingProfileGradientAccumulationSteps | quote }}
            - name: TRAINING_SERVICE_TRAINING_PROFILE_LORA_R
              value: {{ .Values.env.trainingProfileLoraR | quote }}
            - name: TRAINING_SERVICE_TRAINING_PROFILE_LORA_ALPHA
              value: {{ .Values.env.trainingProfileLoraAlpha | quote }}
            - name: TRAINING_SERVICE_EXECUTOR_PROVIDER
              value: {{ .Values.env.executorProvider | quote }}
            - name: TRAINING_SERVICE_RAY_JOBS_URL
              value: {{ .Values.env.rayJobsUrl | quote }}
            - name: TRAINING_SERVICE_RAY_TRAINING_ENTRYPOINT
              value: {{ .Values.env.rayTrainingEntrypoint | quote }}
            - name: TRAINING_SERVICE_RAY_EVALUATION_ENTRYPOINT
              value: {{ .Values.env.rayEvaluationEntrypoint | quote }}
            - name: TRAINING_SERVICE_AXOLOTL_COMMAND
              value: {{ .Values.env.axolotlCommand | quote }}
            - name: TRAINING_SERVICE_RAY_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.env.rayRequestTimeoutSeconds | quote }}
            - name: TRAINING_SERVICE_RAY_POLL_INTERVAL_SECONDS
              value: {{ .Values.env.rayPollIntervalSeconds | quote }}
            - name: TRAINING_SERVICE_KUBERAY_NAMESPACE
              value: {{ .Values.env.kubeRayNamespace | quote }}
            - name: TRAINING_SERVICE_KUBERAY_RAY_VERSION
              value: {{ .Values.env.kubeRayRayVersion | quote }}
            - name: TRAINING_SERVICE_KUBERAY_IMAGE
              value: {{ .Values.env.kubeRayImage | quote }}
            - name: TRAINING_SERVICE_KUBERAY_IMAGE_PULL_POLICY
              value: {{ .Values.env.kubeRayImagePullPolicy | quote }}
            - name: TRAINING_SERVICE_KUBERAY_SERVICE_ACCOUNT
              value: {{ .Values.env.kubeRayServiceAccount | quote }}
            - name: TRAINING_SERVICE_KUBERAY_TTL_SECONDS_AFTER_FINISHED
              value: {{ .Values.env.kubeRayTtlSecondsAfterFinished | quote }}
            - name: TRAINING_SERVICE_KUBERAY_WORKER_REPLICAS
              value: {{ .Values.env.kubeRayWorkerReplicas | quote }}
            - name: TRAINING_SERVICE_KUBERAY_CPU
              value: {{ .Values.env.kubeRayCpu | quote }}
            - name: TRAINING_SERVICE_KUBERAY_MEMORY
              value: {{ .Values.env.kubeRayMemory | quote }}
            - name: TRAINING_SERVICE_KUBERAY_GPU_RESOURCE
              value: {{ .Values.env.kubeRayGpuResource | quote }}
            - name: TRAINING_SERVICE_KUBERAY_GPU
              value: {{ .Values.env.kubeRayGpu | quote }}
            - name: TRAINING_SERVICE_ARTIFACT_BUCKET_REGION
              value: {{ .Values.env.artifactBucketRegion | quote }}
            - name: TRAINING_SERVICE_MODEL_URI_PREFIX
              value: {{ .Values.env.modelUriPrefix | quote }}
            - name: TRAINING_SERVICE_EVALUATION_URI_PREFIX
              value: {{ .Values.env.evaluationUriPrefix | quote }}
            - name: TRAINING_SERVICE_SERVING_TARGET
              value: {{ .Values.env.servingTarget | quote }}
            - name: TRAINING_SERVICE_SERVING_MODEL
              value: {{ .Values.env.servingModel | quote }}
            - name: TRAINING_SERVICE_SERVING_LOAD_STATUS
              value: {{ .Values.env.servingLoadStatus | quote }}
            - name: TRAINING_HEALTHCHECK_CPU_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckCpuThreshold | quote }}
            - name: TRAINING_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckFreeMemThreshold | quote }}
            - name: TRAINING_HEALTHCHECK_PORT
              value: {{ .Values.service.healthPort | quote }}
            - name: TRAINING_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckServiceLatencyThreshold | quote }}
            - name: TRAINING_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckMessageBrokerLatencyThreshold | quote }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
