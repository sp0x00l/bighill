      - TOOL_CATALOG_SERVICE_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS=${TOOL_CATALOG_SERVICE_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS}
      - TOOL_CATALOG_SERVICE_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS=${TOOL_CATALOG_SERVICE_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS}
      - TOOL_CATALOG_SERVICE_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS=${TOOL_CATALOG_SERVICE_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS}
      - TOOL_CATALOG_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_POLL_SILENCE_SECONDS=${TOOL_CATALOG_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_POLL_SILENCE_SECONDS}
      - TOOL_CATALOG_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_PROGRESS_SILENCE_SECONDS=${TOOL_CATALOG_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_PROGRESS_SILENCE_SECONDS}
      - TOOL_CATALOG_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_LAG=${TOOL_CATALOG_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_LAG}
      - TOOL_CATALOG_SERVICE_LIFECYCLE_READINESS_TIMEOUT_SECONDS=${TOOL_CATALOG_SERVICE_LIFECYCLE_READINESS_TIMEOUT_SECONDS}
      - TOOL_CATALOG_SERVICE_LIFECYCLE_DRAIN_TIMEOUT_SECONDS=${TOOL_CATALOG_SERVICE_LIFECYCLE_DRAIN_TIMEOUT_SECONDS}
      - TOOL_CATALOG_SERVICE_LIFECYCLE_CLOSE_TIMEOUT_SECONDS=${TOOL_CATALOG_SERVICE_LIFECYCLE_CLOSE_TIMEOUT_SECONDS}
    depends_on:
      - bighilldb
      - kafka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${TOOL_CATALOG_SERVICE_HEALTHCHECK_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bighillnetwork

  inference-service:
    image: inference-service:${INFERENCE_SERVICE_BUILD_VERSION:-0.0.0}
    build:
      context: .
      dockerfile: inference-service.Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
        BUILD_VERSION_REQUIRED: ${INFERENCE_SERVICE_BUILD_VERSION:-0.0.0}
    restart: always
    ports:
      - "5059:5059"
      - "7073:7073"
    environment:
      - DB_DEBUG=true
      - ENVIRONMENT=${ENVIRONMENT}
      - KAFKA_BROKER=${KAFKA_BROKER}
      - PGHOST=bighilldb
      - PGPORT=${PGPORT}
      - PGSSLMODE=disable
      - POSTGRES_DEBUG=${POSTGRES_DEBUG}
      - INFERENCE_SERVICE_NAME=${INFERENCE_SERVICE_NAME}
      - INFERENCE_SERVICE_BUILD_VERSION=${INFERENCE_SERVICE_BUILD_VERSION}
      - INFERENCE_SERVICE_DB_NAME=${INFERENCE_SERVICE_DB_NAME}
      - INFERENCE_SERVICE_DB_USER=${INFERENCE_SERVICE_DB_USER}
      - INFERENCE_SERVICE_DB_PASSWORD=${INFERENCE_SERVICE_DB_PASSWORD}
      - INFERENCE_SERVICE_DB_MAX_CONNECTIONS=${INFERENCE_SERVICE_DB_MAX_CONNECTIONS}
      - INFERENCE_SERVICE_API_GRPC_PORT=${INFERENCE_SERVICE_API_GRPC_PORT}
      - INFERENCE_SERVICE_HTTP_READ_TIMEOUT_SECONDS=${INFERENCE_SERVICE_HTTP_READ_TIMEOUT_SECONDS}
      - INFERENCE_SERVICE_HTTP_WRITE_TIMEOUT_SECONDS=${INFERENCE_SERVICE_HTTP_WRITE_TIMEOUT_SECONDS}
      - INFERENCE_SERVICE_HTTP_IDLE_TIMEOUT_SECONDS=${INFERENCE_SERVICE_HTTP_IDLE_TIMEOUT_SECONDS}
      - INFERENCE_SERVICE_KAFKA_BASE_GROUP_ID=${INFERENCE_SERVICE_KAFKA_BASE_GROUP_ID}
      - INFERENCE_SERVICE_KAFKA_AUTO_OFFSET_RESET=${INFERENCE_SERVICE_KAFKA_AUTO_OFFSET_RESET}
      - INFERENCE_SERVICE_MODEL_REGISTRY_SUBSCRIBER_TOPIC=${INFERENCE_SERVICE_MODEL_REGISTRY_SUBSCRIBER_TOPIC}
      - INFERENCE_SERVICE_DATA_REGISTRY_SUBSCRIBER_TOPIC=${INFERENCE_SERVICE_DATA_REGISTRY_SUBSCRIBER_TOPIC}
      - INFERENCE_SERVICE_TENANT_SUBSCRIBER_TOPIC=${INFERENCE_SERVICE_TENANT_SUBSCRIBER_TOPIC}
      - INFERENCE_SERVICE_PREFERENCE_DATASET_TOPIC=${INFERENCE_SERVICE_PREFERENCE_DATASET_TOPIC}
      - INFERENCE_SERVICE_OUTBOX=${INFERENCE_SERVICE_OUTBOX}
      - INFERENCE_SERVICE_OUTBOX_RELAY_POLL_MS=${INFERENCE_SERVICE_OUTBOX_RELAY_POLL_MS}
      - INFERENCE_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS=${INFERENCE_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS}
      - INFERENCE_SERVICE_OUTBOX_RELAY_BATCH_SIZE=${INFERENCE_SERVICE_OUTBOX_RELAY_BATCH_SIZE}
      - INFERENCE_SERVICE_DLQ=${INFERENCE_SERVICE_DLQ}
      - INFERENCE_SERVICE_FEATURE_MATERIALIZER_GRPC_ADDRESS=feature-materializer-service:${FEATURE_MATERIALIZER_SERVICE_API_GRPC_PORT}
      - INFERENCE_SERVICE_FEATURE_MATERIALIZER_GRPC_DIAL_TIMEOUT_MS=${INFERENCE_SERVICE_FEATURE_MATERIALIZER_GRPC_DIAL_TIMEOUT_MS}
      - INFERENCE_SERVICE_FEATURE_MATERIALIZER_GRPC_CALL_TIMEOUT_MS=${INFERENCE_SERVICE_FEATURE_MATERIALIZER_GRPC_CALL_TIMEOUT_MS}
      - INFERENCE_SERVICE_FEATURE_MATERIALIZER_GRPC_RETRY_COUNT=${INFERENCE_SERVICE_FEATURE_MATERIALIZER_GRPC_RETRY_COUNT}
      - INFERENCE_SERVICE_TOOL_EXECUTION_GRPC_ADDRESS=tool-execution-service:${TOOL_EXECUTION_SERVICE_GRPC_PORT}
      - INFERENCE_SERVICE_TOOL_EXECUTION_GRPC_DIAL_TIMEOUT_MS=${INFERENCE_SERVICE_TOOL_EXECUTION_GRPC_DIAL_TIMEOUT_MS}
      - INFERENCE_SERVICE_TOOL_EXECUTION_GRPC_CALL_TIMEOUT_MS=${INFERENCE_SERVICE_TOOL_EXECUTION_GRPC_CALL_TIMEOUT_MS}
      - INFERENCE_SERVICE_TOOL_EXECUTION_GRPC_RETRY_COUNT=${INFERENCE_SERVICE_TOOL_EXECUTION_GRPC_RETRY_COUNT}
      - INFERENCE_SERVICE_MODEL_SERVING_ENDPOINT=http://model-serving-service:${MODEL_SERVING_SERVICE_HEALTHCHECK_PORT}
      - INFERENCE_SERVICE_MODEL_SERVING_REQUEST_TIMEOUT_SECONDS=${INFERENCE_SERVICE_MODEL_SERVING_REQUEST_TIMEOUT_SECONDS}
      - INFERENCE_SERVICE_MODEL_SERVING_LOAD_TIMEOUT_SECONDS=${INFERENCE_SERVICE_MODEL_SERVING_LOAD_TIMEOUT_SECONDS}
      - INFERENCE_SERVICE_MODEL_SERVING_LOAD_POLL_MS=${INFERENCE_SERVICE_MODEL_SERVING_LOAD_POLL_MS}
      - INFERENCE_SERVICE_GENERATION_REQUEST_TIMEOUT_SECONDS=${INFERENCE_SERVICE_GENERATION_REQUEST_TIMEOUT_SECONDS}
      - INFERENCE_SERVICE_GENERATION_MAX_OUTPUT_TOKENS=${INFERENCE_SERVICE_GENERATION_MAX_OUTPUT_TOKENS}
      - INFERENCE_SERVICE_RERANKER_PROVIDER=${INFERENCE_SERVICE_RERANKER_PROVIDER}
      - INFERENCE_SERVICE_RERANKER_URL=http://tei-embeddings:80
      - INFERENCE_SERVICE_RERANKER_MODEL=${INFERENCE_SERVICE_RERANKER_MODEL}
      - INFERENCE_SERVICE_RERANKER_REQUEST_TIMEOUT_SECONDS=${INFERENCE_SERVICE_RERANKER_REQUEST_TIMEOUT_SECONDS}
      - INFERENCE_SERVICE_RERANKER_CANDIDATE_MULTIPLIER=${INFERENCE_SERVICE_RERANKER_CANDIDATE_MULTIPLIER}
      - INFERENCE_SERVICE_QUERY_TRANSFORMER_PROVIDER=${INFERENCE_SERVICE_QUERY_TRANSFORMER_PROVIDER}
      - INFERENCE_SERVICE_QUERY_TRANSFORMER_REQUEST_TIMEOUT_SECONDS=${INFERENCE_SERVICE_QUERY_TRANSFORMER_REQUEST_TIMEOUT_SECONDS}
      - INFERENCE_SERVICE_PREFERENCE_DATASET_EXPORT_ENABLED=${INFERENCE_SERVICE_PREFERENCE_DATASET_EXPORT_ENABLED}
      - INFERENCE_SERVICE_PREFERENCE_DATASET_URI_TEMPLATE=${INFERENCE_SERVICE_PREFERENCE_DATASET_URI_TEMPLATE}
      - INFERENCE_SERVICE_PREFERENCE_DATASET_MIN_EXAMPLES=${INFERENCE_SERVICE_PREFERENCE_DATASET_MIN_EXAMPLES}
      - INFERENCE_SERVICE_PREFERENCE_DATASET_LIMIT=${INFERENCE_SERVICE_PREFERENCE_DATASET_LIMIT}
      - INFERENCE_SERVICE_PREFERENCE_DATASET_BUCKET_REGION=${INFERENCE_SERVICE_PREFERENCE_DATASET_BUCKET_REGION}
      - INFERENCE_SERVICE_PREFERENCE_DATASET_UPLOAD_PART_SIZE_MB=${INFERENCE_SERVICE_PREFERENCE_DATASET_UPLOAD_PART_SIZE_MB}
      - INFERENCE_SERVICE_PROMPT_STRATEGY_VERSION=${INFERENCE_SERVICE_PROMPT_STRATEGY_VERSION}
      - INFERENCE_SERVICE_PROMPT_MAX_CONTEXT_TOKENS=${INFERENCE_SERVICE_PROMPT_MAX_CONTEXT_TOKENS}
      - INFERENCE_SERVICE_PROMPT_MAX_CONTEXT_CHUNKS=${INFERENCE_SERVICE_PROMPT_MAX_CONTEXT_CHUNKS}
      - INFERENCE_SERVICE_HEALTHCHECK_CPU_THRESHOLD_PERCENT=${INFERENCE_SERVICE_HEALTHCHECK_CPU_THRESHOLD_PERCENT}
      - INFERENCE_SERVICE_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT=${INFERENCE_SERVICE_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT}
      - INFERENCE_SERVICE_HEALTHCHECK_PORT=${INFERENCE_SERVICE_HEALTHCHECK_PORT}
      - INFERENCE_SERVICE_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS=${INFERENCE_SERVICE_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS}
      - INFERENCE_SERVICE_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS=${INFERENCE_SERVICE_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS}
      - INFERENCE_SERVICE_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS=${INFERENCE_SERVICE_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS}
    depends_on:
      - bighilldb
      - kafka
      - tei-embeddings
      - tool-execution-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${INFERENCE_SERVICE_HEALTHCHECK_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bighillnetwork

  polaris-object-store:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: polaris-object-store
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      MINIO_ROOT_USER: polaris_root
      MINIO_ROOT_PASSWORD: polaris_pass
      MINIO_REGION_NAME: eu-west-1
      MINIO_REGION: eu-west-1
      MINIO_DOMAIN: polaris-object-store
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - polaris_object_store:/data
    networks:
      bighillnetwork:
        aliases:
          - bighill-mlops-lakehouse.polaris-object-store

  polaris-bucket-setup:
    image: amazon/aws-cli:2.35.11
    depends_on:
      polaris-object-store:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: polaris_root
      AWS_SECRET_ACCESS_KEY: polaris_pass
      AWS_ENDPOINT_URL: http://polaris-object-store:9000
    entrypoint: "/bin/sh"
    command:
      - "-c"
      - >-
        aws s3 mb s3://bighill-mlops-lakehouse || true
    networks:
      - bighillnetwork

  polaris-catalog:
    image: apache/polaris:1.0.0-incubating
    container_name: polaris-catalog
    ports:
      - "8181:8181"
      - "8182:8182"
      - "5005:5005"
    depends_on:
      polaris-object-store:
        condition: service_healthy
      polaris-bucket-setup:
        condition: service_completed_successfully
    environment:
      JAVA_DEBUG: "true"
      JAVA_DEBUG_PORT: "*:5005"
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: polaris_root
      AWS_SECRET_ACCESS_KEY: polaris_pass
      AWS_ENDPOINT_URL: http://polaris-object-store:9000
      AWS_ENDPOINT_URL_S3: http://polaris-object-store:9000
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_S3_PATH_STYLE_ACCESS: "true"
      JAVA_TOOL_OPTIONS: "-Daws.s3.pathStyleAccess=true"
      POLARIS_BOOTSTRAP_CREDENTIALS: POLARIS,${POLARIS_ROOT_CLIENT_ID:-root},${POLARIS_ROOT_CLIENT_SECRET:-s3cr3t}
      polaris.realm-context.realms: ${POLARIS_REALM:-POLARIS}
      polaris.features."SKIP_CREDENTIAL_SUBSCOPING_INDIRECTION": "true"
      quarkus.otel.sdk.disabled: "true"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - bighillnetwork

  polaris-bootstrap:
    image: python:3.12-alpine
    depends_on:
      polaris-catalog:
        condition: service_healthy
    environment:
      POLARIS_BASE_URL: http://polaris-catalog:8181
      POLARIS_ROOT_CLIENT_ID: ${POLARIS_ROOT_CLIENT_ID:-root}
      POLARIS_ROOT_CLIENT_SECRET: ${POLARIS_ROOT_CLIENT_SECRET:-s3cr3t}
      POLARIS_CATALOG: bighill
      POLARIS_WAREHOUSE: s3://bighill-mlops-lakehouse/
      POLARIS_STORAGE_ENDPOINT: http://polaris-object-store:9000
      POLARIS_STORAGE_REGION: eu-west-1
      POLARIS_STORAGE_PATH_STYLE: "true"
      POLARIS_SERVICE_PRINCIPAL: bighill-services
      POLARIS_PRINCIPAL_ROLE: bighill-services
      POLARIS_CATALOG_ROLE: bighill-catalog-writer
      POLARIS_SERVICE_CREDENTIAL: ${DATA_STREAM_SERVICE_POLARIS_CREDENTIAL:-root:s3cr3t}
    volumes:
      - ./infra/scripts/polaris_bootstrap.py:/bootstrap/polaris_bootstrap.py:ro
    command: ["python", "/bootstrap/polaris_bootstrap.py"]
    networks:
      - bighillnetwork

  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    # production
      # - KAFKA_ENABLE_KRAFT=yes
      # - KAFKA_CFG_NODE_ID=0
      # - KAFKA_CFG_PROCESS_ROLES=controller,broker
      # - KAFKA_CFG_LISTENERS=SSL://:9092,CONTROLLER://:9093
      # - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,SSL:SSL
      # - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      # - KAFKA_ADVERTISED_LISTENERS=SSL://localhost:9092
      # - KAFKA_CFG_SSL_KEYSTORE_LOCATION=/path/keystore.jks
      # - KAFKA_CFG_SSL_KEYSTORE_PASSWORD=bighillkeystore_password
      # - KAFKA_CFG_SSL_KEY_PASSWORD=bighillkey_password
      # - KAFKA_CFG_SSL_TRUSTSTORE_LOCATION=/path/truststore.jks
      # - KAFKA_CFG_SSL_TRUSTSTORE_PASSWORD=bighilltruststore_password      
    volumes:
      - kafka_data:/bitnami/kafka/data
    networks:
      - bighillnetwork

volumes:
  postgres_data:
  kafka_data:
  redis_data:
  tei_cache:
  ollama_data:
  polaris_object_store:
  local_served_models:
  model_serving_artifacts:

networks:
  bighillnetwork:
      name: bighillnetwork
