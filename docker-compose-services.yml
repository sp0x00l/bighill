      - TENANT_SERVICE_KAFKA_PUBLISHER_TOPIC=${TENANT_SERVICE_KAFKA_PUBLISHER_TOPIC}
      - TENANT_SERVICE_OUTBOX_RELAY_POLL_MS=${TENANT_SERVICE_OUTBOX_RELAY_POLL_MS}
      - TENANT_SERVICE_OUTBOX_RELAY_BATCH_SIZE=${TENANT_SERVICE_OUTBOX_RELAY_BATCH_SIZE}
      - TENANT_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS=${TENANT_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS}
      - TENANT_SERVICE_HEALTHCHECK_CPU_THRESHOLD_PERCENT=${TENANT_SERVICE_HEALTHCHECK_CPU_THRESHOLD_PERCENT}
      - TENANT_SERVICE_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT=${TENANT_SERVICE_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT}
      - TENANT_SERVICE_HEALTHCHECK_PORT=${TENANT_SERVICE_HEALTHCHECK_PORT}
