
services:        
  bighilldb:
    image: postgres:alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      - BIGHILL_DB_NAMES=${BIGHILL_DB_NAMES}
      - BIGHILL_DB_ADMIN=${BIGHILL_DB_ADMIN}
      - BIGHILL_DB_MIGRATIONS_USER=${BIGHILL_DB_MIGRATIONS_USER}      
      - BIGHILL_DB_ADMIN_PASSWORD=${BIGHILL_DB_ADMIN_PASSWORD}
      - BIGHILL_DB_PASSWORD=${BIGHILL_DB_PASSWORD}
      - PGSSLMODE=${PGSSLMODE}
      - POSTGRES_DEBUG=${POSTGRES_DEBUG}
      - POSTGRES_PASSWORD=${BIGHILL_DB_ADMIN_PASSWORD}
      - POSTGRES_USERNAME=${BIGHILL_DB_ADMIN}
      - PGPASSWORD=${BIGHILL_DB_ADMIN_PASSWORD}
      - PGDATABASE="postgres"
    volumes:
      - ./database/scripts/setup/common:/docker-entrypoint-initdb.d/
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: pg_isready -p 5432 -d ${DATA_REGISTRY_DB_NAME} -U ${BIGHILL_DB_ADMIN}
      interval: 30s
      timeout: 30s
      retries: 5
    networks:
      - bighillnetwork

  migrations:
    image: migrations
    build:
      context: .
      dockerfile: migrations.Dockerfile
    environment:
      - BIGHILL_DB_NAMES=${BIGHILL_DB_NAMES}
      - BIGHILL_DB_ADMIN=${BIGHILL_DB_ADMIN}
      - BIGHILL_DB_ADMIN_PASSWORD=${BIGHILL_DB_ADMIN_PASSWORD}
      - BIGHILL_DB_MIGRATIONS_USER=${BIGHILL_DB_MIGRATIONS_USER}
      - BIGHILL_DB_PASSWORD=${BIGHILL_DB_PASSWORD}
      - PGHOST=bighilldb
      - PGPORT=${PGPORT}
      - PGSSLMODE=disable
    depends_on:
      - bighilldb
    networks:
      - bighillnetwork

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - bighillnetwork

  api-gateway:
    image: api-gateway
    build:
      context: .
      dockerfile: api-gateway.Dockerfile
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SAM_CLI_TELEMETRY=0
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_ACCESS_KEY_ID=access_key_id
      - AWS_SECRET_ACCESS_KEY=secret_access_key
      - AWS_DEFAULT_REGION=region

  data-ingestion-service:
    image: data-ingestion-service:${DATA_INGESTION_SERVICE_BUILD_VERSION:-0.0.0}
    build:
      context: .
      dockerfile: data-ingestion-service.Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
        BUILD_VERSION_REQUIRED: ${DATA_INGESTION_SERVICE_BUILD_VERSION:-0.0.0}
    restart: always
    ports:
      - "8086:8086"
    environment:
      - DB_DEBUG=true
      - ENVIRONMENT=${ENVIRONMENT}
      - PGHOST=bighilldb
      - PGPORT=${PGPORT}
      - PGSSLMODE=disable
      - POSTGRES_DEBUG=${POSTGRES_DEBUG}
      - KAFKA_BROKER=${KAFKA_BROKER}
      - DATA_INGESTION_API_HTTP_PORT=${DATA_INGESTION_API_HTTP_PORT}
      - DATA_INGESTION_FILES_BUCKET_NAME=${DATA_INGESTION_FILES_BUCKET_NAME}
      - DATA_INGESTION_FILES_BUCKET_REGION=${DATA_INGESTION_FILES_BUCKET_REGION}
      - DATA_INGESTION_FILES_UPLOAD_PART_SIZE_MS=${DATA_INGESTION_FILES_UPLOAD_PART_SIZE_MS}
      - DATA_INGESTION_HEALTHCHECK_CPU_THRESHOLD_PERCENT=${DATA_INGESTION_HEALTHCHECK_CPU_THRESHOLD_PERCENT}
      - DATA_INGESTION_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT=${DATA_INGESTION_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT}
      - DATA_INGESTION_HEALTHCHECK_PORT=${DATA_INGESTION_HEALTHCHECK_PORT}
      - DATA_INGESTION_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS=${DATA_INGESTION_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS}
      - DATA_INGESTION_FILE_MAX_SIZE_MB=${DATA_INGESTION_FILE_MAX_SIZE_MB}
      - DATA_INGESTION_DB_NAME=${DATA_INGESTION_DB_NAME}
      - DATA_INGESTION_DB_USER=${DATA_INGESTION_DB_USER}
      - DATA_INGESTION_DB_PASSWORD=${BIGHILL_DB_PASSWORD}
      - DATA_INGESTION_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS=${DATA_INGESTION_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS}
      - DATA_INGESTION_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS=${DATA_INGESTION_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS}
      - DATA_INGESTION_SERVICE_KAFKA_GROUP_ID=${DATA_INGESTION_SERVICE_KAFKA_GROUP_ID}
      - DATA_INGESTION_SERVICE_DATASET_FILE_UPLOADED_PUBLISHER_TOPIC=${DATA_INGESTION_SERVICE_DATASET_FILE_UPLOADED_PUBLISHER_TOPIC}
      - DATA_INGESTION_SERVICE_DLQ=${DATA_INGESTION_SERVICE_DLQ}
      - DATA_INGESTION_SERVICE_OUTBOX=${DATA_INGESTION_SERVICE_OUTBOX}
      - DATA_INGESTION_SERVICE_OUTBOX_RELAY_POLL_MS=${DATA_INGESTION_SERVICE_OUTBOX_RELAY_POLL_MS}
      - DATA_INGESTION_SERVICE_OUTBOX_RELAY_BATCH_SIZE=${DATA_INGESTION_SERVICE_OUTBOX_RELAY_BATCH_SIZE}
      - DATA_INGESTION_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS=${DATA_INGESTION_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS}
      - DATA_INGESTION_SERVICE_REDIS_ADDRESS=redis:6379
      - DATA_INGESTION_SERVICE_REDIS_USERNAME=${DATA_INGESTION_SERVICE_REDIS_USERNAME}
      - DATA_INGESTION_SERVICE_REDIS_PASSWORD=${DATA_INGESTION_SERVICE_REDIS_PASSWORD}
    depends_on:
      - kafka
      - bighilldb
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${DATA_INGESTION_HEALTHCHECK_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bighillnetwork

  data-registry-service:
    image: data-registry-service:${DATA_REGISTRY_SERVICE_BUILD_VERSION:-0.0.0}
    build:
      context: .
      dockerfile: data-registry-service.Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
        BUILD_VERSION_REQUIRED: ${DATA_REGISTRY_SERVICE_BUILD_VERSION:-0.0.0}
    restart: always
    ports:
      - "8081:8081"
      - "7071:7071"
    environment:
      - DB_DEBUG=true
      - ENVIRONMENT=${ENVIRONMENT}
      - PGHOST=bighilldb
      - PGPORT=${PGPORT}
      - PGSSLMODE=disable
      - POSTGRES_DEBUG=${POSTGRES_DEBUG}
      - KAFKA_BROKER=${KAFKA_BROKER}
      - DATA_REGISTRY_DB_NAME=${DATA_REGISTRY_DB_NAME}
      - DATA_REGISTRY_DB_USER=${DATA_REGISTRY_DB_USER}
      - DATA_REGISTRY_DB_PASSWORD=${DATA_REGISTRY_DB_PASSWORD}
      - DATA_REGISTRY_API_HTTP_PORT=${DATA_REGISTRY_API_HTTP_PORT}
      - DATA_REGISTRY_API_GRPC_PORT=${DATA_REGISTRY_API_GRPC_PORT}
      - DATA_REGISTRY_HEALTHCHECK_CPU_THRESHOLD_PERCENT=${DATA_REGISTRY_HEALTHCHECK_CPU_THRESHOLD_PERCENT}
      - DATA_REGISTRY_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT=${DATA_REGISTRY_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT}
      - DATA_REGISTRY_HEALTHCHECK_PORT=${DATA_REGISTRY_HEALTHCHECK_PORT}
      - DATA_REGISTRY_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS=${DATA_REGISTRY_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS}
      - DATA_REGISTRY_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS=${DATA_REGISTRY_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS}
      - DATA_REGISTRY_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS=${DATA_REGISTRY_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS}
      - DATA_REGISTRY_SERVICE_KAFKA_GROUP_ID=${DATA_REGISTRY_SERVICE_KAFKA_GROUP_ID}
      - DATA_REGISTRY_SERVICE_DLQ=${DATA_REGISTRY_SERVICE_DLQ}
      - DATA_REGISTRY_SERVICE_OUTBOX=${DATA_REGISTRY_SERVICE_OUTBOX}
      - DATA_REGISTRY_SERVICE_OUTBOX_RELAY_POLL_MS=${DATA_REGISTRY_SERVICE_OUTBOX_RELAY_POLL_MS}
      - DATA_REGISTRY_SERVICE_OUTBOX_RELAY_BATCH_SIZE=${DATA_REGISTRY_SERVICE_OUTBOX_RELAY_BATCH_SIZE}
      - DATA_REGISTRY_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS=${DATA_REGISTRY_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS}
    depends_on:
      - kafka
      - bighilldb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${DATA_REGISTRY_HEALTHCHECK_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bighillnetwork

  data-stream-service:
    image: data-stream-service:${DATA_STREAM_SERVICE_BUILD_VERSION:-0.0.0}
    build:
      context: .
      dockerfile: data-stream-service.Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
        BUILD_VERSION_REQUIRED: ${DATA_STREAM_SERVICE_BUILD_VERSION:-0.0.0}
    restart: always
    ports:
      - "7070:7070"
      - "5050:5050"
    environment:
      - ENVIRONMENT=${ENVIRONMENT}
      - KAFKA_BROKER=${KAFKA_BROKER}
      - DATA_STREAM_SERVICE_NAME=${DATA_STREAM_SERVICE_NAME}
      - DATA_STREAM_API_GRPC_HOST=0.0.0.0
      - DATA_STREAM_API_GRPC_PORT=${DATA_STREAM_API_GRPC_PORT}
      - DATA_STREAM_QUERY_ENGINE_MODE=${DATA_STREAM_QUERY_ENGINE_MODE}
      - DATA_STREAM_QUERY_ENGINE_DATA_ROOT=${DATA_STREAM_QUERY_ENGINE_DATA_ROOT}
      - DATA_STREAM_QUERY_ENGINE_BINARY_PATH=${DATA_STREAM_QUERY_ENGINE_BINARY_PATH}
      - DATA_STREAM_QUERY_ENGINE_TIMEOUT_SECONDS=${DATA_STREAM_QUERY_ENGINE_TIMEOUT_SECONDS}
      - DATA_STREAM_DATA_REGISTRY_GRPC_ADDRESS=data-registry-service:${DATA_REGISTRY_API_GRPC_PORT}
      - DATA_STREAM_DATA_REGISTRY_GRPC_DIAL_TIMEOUT_MS=${DATA_STREAM_DATA_REGISTRY_GRPC_DIAL_TIMEOUT_MS}
      - DATA_STREAM_DATA_REGISTRY_GRPC_CALL_TIMEOUT_MS=${DATA_STREAM_DATA_REGISTRY_GRPC_CALL_TIMEOUT_MS}
      - DATA_STREAM_DATA_REGISTRY_GRPC_RETRY_COUNT=${DATA_STREAM_DATA_REGISTRY_GRPC_RETRY_COUNT}
      - DATA_STREAM_HEALTHCHECK_CPU_THRESHOLD_PERCENT=${DATA_STREAM_HEALTHCHECK_CPU_THRESHOLD_PERCENT}
      - DATA_STREAM_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT=${DATA_STREAM_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT}
      - DATA_STREAM_HEALTHCHECK_PORT=${DATA_STREAM_HEALTHCHECK_PORT}
      - DATA_STREAM_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS=${DATA_STREAM_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS}
      - DATA_STREAM_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS=${DATA_STREAM_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS}
      - DATA_STREAM_SERVICE_KAFKA_GROUP_ID=${DATA_STREAM_SERVICE_KAFKA_GROUP_ID}
      - DATA_STREAM_SERVICE_DLQ=${DATA_STREAM_SERVICE_DLQ}
      - DATA_STREAM_SERVICE_OUTBOX=${DATA_STREAM_SERVICE_OUTBOX}
      - DATA_STREAM_SERVICE_OUTBOX_RELAY_POLL_MS=${DATA_STREAM_SERVICE_OUTBOX_RELAY_POLL_MS}
      - DATA_STREAM_SERVICE_OUTBOX_RELAY_BATCH_SIZE=${DATA_STREAM_SERVICE_OUTBOX_RELAY_BATCH_SIZE}
      - DATA_STREAM_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS=${DATA_STREAM_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS}
    depends_on:
      - kafka
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${DATA_STREAM_HEALTHCHECK_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bighillnetwork

  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    # production
      # - KAFKA_ENABLE_KRAFT=yes
      # - KAFKA_CFG_NODE_ID=0
      # - KAFKA_CFG_PROCESS_ROLES=controller,broker
      # - KAFKA_CFG_LISTENERS=SSL://:9092,CONTROLLER://:9093
      # - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,SSL:SSL
      # - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      # - KAFKA_ADVERTISED_LISTENERS=SSL://localhost:9092
      # - KAFKA_CFG_SSL_KEYSTORE_LOCATION=/path/keystore.jks
      # - KAFKA_CFG_SSL_KEYSTORE_PASSWORD=bighillkeystore_password
      # - KAFKA_CFG_SSL_KEY_PASSWORD=bighillkey_password
      # - KAFKA_CFG_SSL_TRUSTSTORE_LOCATION=/path/truststore.jks
      # - KAFKA_CFG_SSL_TRUSTSTORE_PASSWORD=bighilltruststore_password      
    volumes:
      - kafka_data:/bitnami/kafka/data
    networks:
      - bighillnetwork

volumes:
  postgres_data:
  kafka_data:
  redis_data:

networks:
  bighillnetwork:
      name: bighillnetwork
