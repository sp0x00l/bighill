
services:        
  bighilldb:
    image: pgvector/pgvector:pg17
    restart: always
    ports:
      - "5432:5432"
    environment:
      - BIGHILL_DB_NAMES=${BIGHILL_DB_NAMES}
      - BIGHILL_DB_ADMIN=${BIGHILL_DB_ADMIN}
      - BIGHILL_DB_MIGRATIONS_USER=${BIGHILL_DB_MIGRATIONS_USER}      
      - BIGHILL_DB_ADMIN_PASSWORD=${BIGHILL_DB_ADMIN_PASSWORD}
      - BIGHILL_DB_PASSWORD=${BIGHILL_DB_PASSWORD}
      - PGSSLMODE=${PGSSLMODE}
      - POSTGRES_DEBUG=${POSTGRES_DEBUG}
      - POSTGRES_PASSWORD=${BIGHILL_DB_ADMIN_PASSWORD}
      - POSTGRES_USERNAME=${BIGHILL_DB_ADMIN}
      - PGPASSWORD=${BIGHILL_DB_ADMIN_PASSWORD}
      - PGDATABASE="postgres"
    volumes:
      - ./database/scripts/setup/common:/docker-entrypoint-initdb.d/
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: pg_isready -p 5432 -d ${DATA_REGISTRY_DB_NAME} -U ${BIGHILL_DB_ADMIN}
      interval: 30s
      timeout: 30s
      retries: 5
    networks:
      - bighillnetwork

  migrations:
    image: migrations
    build:
      context: .
      dockerfile: migrations.Dockerfile
    environment:
      - BIGHILL_DB_NAMES=${BIGHILL_DB_NAMES}
      - BIGHILL_DB_ADMIN=${BIGHILL_DB_ADMIN}
      - BIGHILL_DB_ADMIN_PASSWORD=${BIGHILL_DB_ADMIN_PASSWORD}
      - BIGHILL_DB_MIGRATIONS_USER=${BIGHILL_DB_MIGRATIONS_USER}
      - BIGHILL_DB_PASSWORD=${BIGHILL_DB_PASSWORD}
      - PGHOST=bighilldb
      - PGPORT=${PGPORT}
      - PGSSLMODE=disable
    depends_on:
      - bighilldb
    networks:
      - bighillnetwork

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - bighillnetwork

  temporal:
    image: temporalio/admin-tools:latest
    container_name: temporal
    restart: always
    command:
      - temporal
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --port
      - "7233"
      - --ui-port
      - "8233"
      - --namespace
      - default
    ports:
      - "7233:7233"
      - "8233:8233"
    networks:
      - bighillnetwork

  api-gateway:
    image: api-gateway
    build:
      context: .
      dockerfile: api-gateway.Dockerfile
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SAM_CLI_TELEMETRY=0
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_ACCESS_KEY_ID=access_key_id
      - AWS_SECRET_ACCESS_KEY=secret_access_key
      - AWS_DEFAULT_REGION=region

  profile-service:
    image: profile-service:${PROFILE_SERVICE_BUILD_VERSION:-0.0.0}
    build:
      context: .
      dockerfile: profile-service.Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
        BUILD_VERSION_REQUIRED: ${PROFILE_SERVICE_BUILD_VERSION:-0.0.0}
    restart: always
    ports:
      - "8082:8082"
      - "5052:5052"
    environment:
      - DB_DEBUG=true
      - ENVIRONMENT=${ENVIRONMENT}
      - KAFKA_BROKER=${KAFKA_BROKER}
      - PGHOST=bighilldb
      - PGPORT=${PGPORT}
      - PGSSLMODE=disable
      - POSTGRES_DEBUG=${POSTGRES_DEBUG}
      - KMS_LOCAL_DEV_KEY=${KMS_LOCAL_DEV_KEY}
      - PROFILE_SERVICE_NAME=${PROFILE_SERVICE_NAME}
      - PROFILE_SERVICE_BUILD_VERSION=${PROFILE_SERVICE_BUILD_VERSION}
      - PROFILE_SERVICE_HTTP_PORT=${PROFILE_SERVICE_HTTP_PORT}
      - PROFILE_SERVICE_DB_NAME=${PROFILE_SERVICE_DB_NAME}
      - PROFILE_SERVICE_DB_USER=${PROFILE_SERVICE_DB_USER}
      - PROFILE_SERVICE_DB_PASSWORD=${PROFILE_SERVICE_DB_PASSWORD}
      - PROFILE_SERVICE_DB_MAX_CONNECTIONS=${PROFILE_SERVICE_DB_MAX_CONNECTIONS}
      - PROFILE_SERVICE_REDIS_ADDRESS=redis:6379
      - PROFILE_SERVICE_REDIS_USERNAME=${PROFILE_SERVICE_REDIS_USERNAME}
      - PROFILE_SERVICE_REDIS_PASSWORD=${PROFILE_SERVICE_REDIS_PASSWORD}
      - PROFILE_AUTH_EXPIRATION_MINUTES=${PROFILE_AUTH_EXPIRATION_MINUTES}
      - PROFILE_EMAIL_VALIDATION_TTL_MINUTES=${PROFILE_EMAIL_VALIDATION_TTL_MINUTES}
      - PROFILE_OAUTH_STATE_TTL_MINUTES=${PROFILE_OAUTH_STATE_TTL_MINUTES}
      - PROFILE_USE_STAGING_TEST_EMAIL_TOKEN=${PROFILE_USE_STAGING_TEST_EMAIL_TOKEN}
      - PROFILE_OAUTH_GOOGLE_CLIENT_ID=${PROFILE_OAUTH_GOOGLE_CLIENT_ID}
      - PROFILE_OAUTH_GOOGLE_CLIENT_SECRET=${PROFILE_OAUTH_GOOGLE_CLIENT_SECRET}
      - PROFILE_OAUTH_DISCORD_CLIENT_ID=${PROFILE_OAUTH_DISCORD_CLIENT_ID}
      - PROFILE_OAUTH_DISCORD_CLIENT_SECRET=${PROFILE_OAUTH_DISCORD_CLIENT_SECRET}
      - PROFILE_DLQ=${PROFILE_DLQ}
      - PROFILE_OUTBOX=${PROFILE_OUTBOX}
      - PROFILE_KAFKA_GROUP_ID=${PROFILE_KAFKA_GROUP_ID}
      - PROFILE_SERVICE_KAFKA_PUBLISHER_TOPIC=${PROFILE_SERVICE_KAFKA_PUBLISHER_TOPIC}
      - PROFILE_SERVICE_OUTBOX_RELAY_POLL_MS=${PROFILE_SERVICE_OUTBOX_RELAY_POLL_MS}
      - PROFILE_SERVICE_OUTBOX_RELAY_BATCH_SIZE=${PROFILE_SERVICE_OUTBOX_RELAY_BATCH_SIZE}
      - PROFILE_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS=${PROFILE_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS}
      - PROFILE_SERVICE_HEALTHCHECK_CPU_THRESHOLD_PERCENT=${PROFILE_SERVICE_HEALTHCHECK_CPU_THRESHOLD_PERCENT}
      - PROFILE_SERVICE_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT=${PROFILE_SERVICE_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT}
      - PROFILE_SERVICE_HEALTHCHECK_PORT=${PROFILE_SERVICE_HEALTHCHECK_PORT}
      - PROFILE_SERVICE_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS=${PROFILE_SERVICE_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS}
      - PROFILE_SERVICE_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS=${PROFILE_SERVICE_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS}
      - PROFILE_SERVICE_HEALTHCHECK_KAFKA_LATENCY_THRESHOLD_SECONDS=${PROFILE_SERVICE_HEALTHCHECK_KAFKA_LATENCY_THRESHOLD_SECONDS}
    depends_on:
      - kafka
      - bighilldb
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PROFILE_SERVICE_HEALTHCHECK_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
