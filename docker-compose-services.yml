      - TENANT_SERVICE_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS=${TENANT_SERVICE_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS}
      - TENANT_SERVICE_HEALTHCHECK_KAFKA_LATENCY_THRESHOLD_SECONDS=${TENANT_SERVICE_HEALTHCHECK_KAFKA_LATENCY_THRESHOLD_SECONDS}
    depends_on:
      - kafka
      - bighilldb
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${TENANT_SERVICE_HEALTHCHECK_PORT}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
