  polaris-object-store:
    image: rustfs/rustfs:1.0.0-alpha.81
    container_name: polaris-object-store
    ports:
      - "9100:9000"
      - "9101:9001"
    environment:
      RUSTFS_ACCESS_KEY: polaris_root
      RUSTFS_SECRET_KEY: polaris_pass
      RUSTFS_VOLUMES: /data
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_CONSOLE_ADDRESS: ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://127.0.0.1:9000/health && curl --fail http://127.0.0.1:9001/rustfs/console/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - polaris_object_store:/data
    networks:
      - bighillnetwork

  polaris-bucket-setup:
    image: amazon/aws-cli:2.35.11
    depends_on:
      polaris-object-store:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: polaris_root
      AWS_SECRET_ACCESS_KEY: polaris_pass
      AWS_ENDPOINT_URL: http://polaris-object-store:9000
    entrypoint: "/bin/sh"
    command:
      - "-c"
      - >-
        aws s3 mb s3://bighill-mlops-lakehouse || true
    networks:
      - bighillnetwork

  polaris-catalog:
    image: apache/polaris:latest
    container_name: polaris-catalog
    ports:
      - "8181:8181"
      - "8182:8182"
      - "5005:5005"
    depends_on:
      polaris-object-store:
        condition: service_healthy
      polaris-bucket-setup:
        condition: service_completed_successfully
    environment:
      JAVA_DEBUG: "true"
      JAVA_DEBUG_PORT: "*:5005"
      AWS_REGION: us-west-2
      AWS_ACCESS_KEY_ID: polaris_root
      AWS_SECRET_ACCESS_KEY: polaris_pass
      POLARIS_BOOTSTRAP_CREDENTIALS: POLARIS,${POLARIS_ROOT_CLIENT_ID:-root},${POLARIS_ROOT_CLIENT_SECRET:-s3cr3t}
      polaris.realm-context.realms: ${POLARIS_REALM:-POLARIS}
      quarkus.otel.sdk.disabled: "true"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8182/q/health"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - bighillnetwork

  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    # production
      # - KAFKA_ENABLE_KRAFT=yes
      # - KAFKA_CFG_NODE_ID=0
      # - KAFKA_CFG_PROCESS_ROLES=controller,broker
      # - KAFKA_CFG_LISTENERS=SSL://:9092,CONTROLLER://:9093
      # - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,SSL:SSL
      # - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      # - KAFKA_ADVERTISED_LISTENERS=SSL://localhost:9092
      # - KAFKA_CFG_SSL_KEYSTORE_LOCATION=/path/keystore.jks
      # - KAFKA_CFG_SSL_KEYSTORE_PASSWORD=bighillkeystore_password
      # - KAFKA_CFG_SSL_KEY_PASSWORD=bighillkey_password
      # - KAFKA_CFG_SSL_TRUSTSTORE_LOCATION=/path/truststore.jks
      # - KAFKA_CFG_SSL_TRUSTSTORE_PASSWORD=bighilltruststore_password      
    volumes:
      - kafka_data:/bitnami/kafka/data
    networks:
      - bighillnetwork

volumes:
  postgres_data:
  kafka_data:
  redis_data:
  polaris_object_store:

networks:
  bighillnetwork:
      name: bighillnetwork
