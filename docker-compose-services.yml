
services:        
  bighilldb:
    image: pgvector/pgvector:pg17
    restart: always
    ports:
      - "5432:5432"
    environment:
      - BIGHILL_DB_NAMES=${BIGHILL_DB_NAMES}
      - BIGHILL_DB_ADMIN=${BIGHILL_DB_ADMIN}
      - BIGHILL_DB_MIGRATIONS_USER=${BIGHILL_DB_MIGRATIONS_USER}      
      - BIGHILL_DB_ADMIN_PASSWORD=${BIGHILL_DB_ADMIN_PASSWORD}
      - BIGHILL_DB_PASSWORD=${BIGHILL_DB_PASSWORD}
      - PGSSLMODE=${PGSSLMODE}
      - POSTGRES_DEBUG=${POSTGRES_DEBUG}
      - POSTGRES_PASSWORD=${BIGHILL_DB_ADMIN_PASSWORD}
      - POSTGRES_USERNAME=${BIGHILL_DB_ADMIN}
      - PGPASSWORD=${BIGHILL_DB_ADMIN_PASSWORD}
      - PGDATABASE="postgres"
    volumes:
      - ./database/scripts/setup/common:/docker-entrypoint-initdb.d/
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: pg_isready -p 5432 -d ${DATA_REGISTRY_SERVICE_DB_NAME} -U ${BIGHILL_DB_ADMIN}
      interval: 30s
      timeout: 30s
      retries: 5
    networks:
      - bighillnetwork

  migrations:
    image: migrations
    build:
      context: .
      dockerfile: migrations.Dockerfile
    environment:
      - BIGHILL_DB_NAMES=${BIGHILL_DB_NAMES}
      - BIGHILL_DB_ADMIN=${BIGHILL_DB_ADMIN}
      - BIGHILL_DB_ADMIN_PASSWORD=${BIGHILL_DB_ADMIN_PASSWORD}
      - BIGHILL_DB_MIGRATIONS_USER=${BIGHILL_DB_MIGRATIONS_USER}
      - BIGHILL_DB_PASSWORD=${BIGHILL_DB_PASSWORD}
      - PGHOST=bighilldb
      - PGPORT=${PGPORT}
      - PGSSLMODE=disable
    depends_on:
      - bighilldb
    networks:
      - bighillnetwork

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - bighillnetwork

  temporal:
    image: temporalio/admin-tools:latest
    container_name: temporal
    restart: always
    command:
      - temporal
      - server
      - start-dev
      - --ip
      - 0.0.0.0
      - --port
      - "7233"
      - --ui-port
      - "8233"
      - --namespace
      - default
    ports:
      - "7233:7233"
      - "8233:8233"
    networks:
      - bighillnetwork

  tei-embeddings:
    image: ${FEATURE_MATERIALIZER_SERVICE_EMBEDDING_RUNTIME_IMAGE}
    platform: linux/amd64
    container_name: tei-embeddings
    restart: always
    ports:
      - "${FEATURE_MATERIALIZER_SERVICE_EMBEDDING_RUNTIME_PORT}:80"
    volumes:
      - tei_cache:/data
    command:
      - --model-id
      - ${FEATURE_MATERIALIZER_SERVICE_EMBEDDING_RUNTIME_MODEL_ID}
    networks:
      - bighillnetwork

  ollama:
    image: ${FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTION_RUNTIME_IMAGE}
    container_name: ollama
    restart: always
    ports:
      - "${FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTION_RUNTIME_PORT}:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - bighillnetwork

  ollama-model-pull:
    image: ${FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTION_RUNTIME_IMAGE}
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    command:
      - pull
      - ${FEATURE_MATERIALIZER_SERVICE_GRAPH_EXTRACTION_MODEL}
    networks:
      - bighillnetwork

  api-gateway:
    image: api-gateway
    build:
      context: .
      dockerfile: api-gateway.Dockerfile
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SAM_CLI_TELEMETRY=0
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_ACCESS_KEY_ID=access_key_id
      - AWS_SECRET_ACCESS_KEY=secret_access_key
      - AWS_DEFAULT_REGION=eu-west-1

  tenant-service:
    image: tenant-service:${TENANT_SERVICE_BUILD_VERSION:-0.0.0}
    build:
      context: .
      dockerfile: tenant-service.Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-arm64}
        BUILD_VERSION_REQUIRED: ${TENANT_SERVICE_BUILD_VERSION:-0.0.0}
    restart: always
    ports:
      - "8082:8082"
      - "5052:5052"
    environment:
      - DB_DEBUG=true
      - ENVIRONMENT=${ENVIRONMENT}
      - KAFKA_BROKER=${KAFKA_BROKER}
      - PGHOST=bighilldb
      - PGPORT=${PGPORT}
      - PGSSLMODE=disable
      - POSTGRES_DEBUG=${POSTGRES_DEBUG}
      - TENANT_SERVICE_NAME=${TENANT_SERVICE_NAME}
      - TENANT_SERVICE_BUILD_VERSION=${TENANT_SERVICE_BUILD_VERSION}
      - TENANT_SERVICE_HTTP_PORT=${TENANT_SERVICE_HTTP_PORT}
      - TENANT_SERVICE_DB_NAME=${TENANT_SERVICE_DB_NAME}
      - TENANT_SERVICE_DB_USER=${TENANT_SERVICE_DB_USER}
      - TENANT_SERVICE_DB_PASSWORD=${TENANT_SERVICE_DB_PASSWORD}
      - TENANT_SERVICE_DB_MAX_CONNECTIONS=${TENANT_SERVICE_DB_MAX_CONNECTIONS}
      - TENANT_SERVICE_REDIS_ADDRESS=redis:6379
      - TENANT_SERVICE_REDIS_USERNAME=${TENANT_SERVICE_REDIS_USERNAME}
      - TENANT_SERVICE_REDIS_PASSWORD=${TENANT_SERVICE_REDIS_PASSWORD}
      - TENANT_SERVICE_AUTH_EXPIRATION_MINUTES=${TENANT_SERVICE_AUTH_EXPIRATION_MINUTES}
      - TENANT_SERVICE_EMAIL_VALIDATION_TTL_MINUTES=${TENANT_SERVICE_EMAIL_VALIDATION_TTL_MINUTES}
      - TENANT_SERVICE_OAUTH_STATE_TTL_MINUTES=${TENANT_SERVICE_OAUTH_STATE_TTL_MINUTES}
      - TENANT_SERVICE_USE_STAGING_TEST_EMAIL_TOKEN=${TENANT_SERVICE_USE_STAGING_TEST_EMAIL_TOKEN}
      - TENANT_SERVICE_HUGGINGFACE_TOKEN_ENCRYPTION_KEY=${TENANT_SERVICE_HUGGINGFACE_TOKEN_ENCRYPTION_KEY}
      - TENANT_SERVICE_OAUTH_GOOGLE_CLIENT_ID=${TENANT_SERVICE_OAUTH_GOOGLE_CLIENT_ID}
      - TENANT_SERVICE_OAUTH_GOOGLE_CLIENT_SECRET=${TENANT_SERVICE_OAUTH_GOOGLE_CLIENT_SECRET}
      - TENANT_SERVICE_OAUTH_DISCORD_CLIENT_ID=${TENANT_SERVICE_OAUTH_DISCORD_CLIENT_ID}
      - TENANT_SERVICE_OAUTH_DISCORD_CLIENT_SECRET=${TENANT_SERVICE_OAUTH_DISCORD_CLIENT_SECRET}
      - TENANT_SERVICE_DLQ=${TENANT_SERVICE_DLQ}
