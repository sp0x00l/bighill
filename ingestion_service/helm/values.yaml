replicaCount: 1
image:
  repository: "ingestion-service"
  tag: "0.0.1"
  pullPolicy: IfNotPresent
serviceAccount:
  create: false
  name: "ingestion-service"
  annotations: {}
service:
  type: ClusterIP
  httpPort: 8086
  healthPort: 5056
ingress:
  enabled: false
  host: ""
  certificateArn: ""
env:
  environment: "local-dev"
  serviceName: "ingestion-service"
  otelExporterEndpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  redisAddress: "redis:6379"
  redisUsername: ""
  redisPassword: ""
  kafkaBroker: "kafka:9092"
  kafkaBaseGroupId: "ingestion"
  kafkaAutoOffsetReset: "earliest"
  topic: "ingestion"
  dataRegistrySubscriberTopic: "data_registry"
  profileSubscriberTopic: "profile"
  dlq: "http://localhost:4566/ingestion-dev-env-queue/"
  outbox: "postgres"
  outboxRelayPollMs: "250"
  outboxRelayBatchSize: "100"
  outboxRelayFailureBackoffMs: "2000"
  filesBucketName: "local-dev-bucket"
  filesBucketRegion: "eu-west-1"
  fileMaxSizeMb: "2000"
  directUploadMaxSizeMb: "5"
  uploadSessionTtlSeconds: "900"
  uploadValidationReadMaxSizeMb: "5"
  filesUploadPartSizeMb: "10"
  huggingFaceTokenEncryptionKey: "01234567890123456789012345678901"
  huggingFaceDownloadMode: "command"
  huggingFaceDownloadCommand: "python -m training_jobs.model_onboard"
  huggingFaceDownloadWorkingDirectory: ""
  huggingFaceOutputUri: "s3://local-dev-bucket/models/huggingface"
  huggingFaceDownloadTimeoutSeconds: "1800"
  huggingFaceJobNamespace: "default"
  huggingFaceJobImage: "training-jobs:0.0.1"
  huggingFaceJobImagePullPolicy: "IfNotPresent"
  huggingFaceJobServiceAccount: "ingestion-service"
  huggingFaceJobTtlSecondsAfterFinished: "3600"
  huggingFaceJobBackoffLimit: "0"
  huggingFaceJobCpu: "1"
  huggingFaceJobMemory: "4Gi"
  huggingFaceJobPollIntervalSeconds: "10"
  huggingFaceJobEnvResourceId: "INGESTION_SERVICE_MODEL_RESOURCE_ID"
  huggingFaceJobEnvModelName: "INGESTION_SERVICE_MODEL_NAME"
  huggingFaceJobEnvModelVersion: "INGESTION_SERVICE_MODEL_VERSION"
  huggingFaceJobEnvBaseModel: "INGESTION_SERVICE_MODEL_BASE_MODEL"
  huggingFaceJobEnvArtifactType: "INGESTION_SERVICE_MODEL_ARTIFACT_TYPE"
  huggingFaceJobEnvArtifactFormat: "INGESTION_SERVICE_MODEL_ARTIFACT_FORMAT"
  huggingFaceJobEnvRepoId: "INGESTION_SERVICE_HUGGINGFACE_REPO_ID"
  huggingFaceJobEnvRevision: "INGESTION_SERVICE_HUGGINGFACE_REVISION"
  huggingFaceJobEnvToken: "INGESTION_SERVICE_HUGGINGFACE_TOKEN"
  huggingFaceJobEnvOutputUri: "INGESTION_SERVICE_HUGGINGFACE_OUTPUT_URI"
  dbCredentialsSecret:
    name: ""
    userKey: "bighill_ingestion_db_user"
    passwordKey: "bighill_ingestion_db_password"
    hostKey: "pg_host"
    portKey: "pg_port"
    sslmodeKey: "pg_sslmode"
    nameKey: "bighill_ingestion_db"
  dbCredentialsExternalSecret:
    enabled: false
    targetSecretName: ""
    refreshInterval: "1h"
    secretStoreRef:
      name: ""
      kind: "SecretStore"
    remoteKeys:
      user: ""
      password: ""
      name: ""
      host: ""
      port: ""
      sslmode: ""
  dbName: "bighill_ingestion_db"
  dbUser: "bighill_ingestion_db_user"
  dbPassword: ""
  dbMaxConnections: "20"
  sharedLibDbStatementTimeoutMs: "15000"
  sharedLibDbLockTimeoutMs: "5000"
  sharedLibDbIdleInTxTimeoutMs: "10000"
  pgHost: "localhost"
  pgPort: "5432"
  pgSslMode: "require"
  healthcheckCpuThreshold: "80"
  healthcheckFreeMemThreshold: "20"
  healthcheckServiceLatencyThreshold: "5"
  healthcheckDbLatencyThreshold: "5"
  healthcheckMessageBrokerLatencyThreshold: "5"
  healthcheckMessageBrokerSubscriberMaxPollSilence: "30"
  healthcheckMessageBrokerSubscriberMaxProgressSilence: "90"
  healthcheckMessageBrokerSubscriberMaxLag: "100000"
  authKmsKeyId: ""
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "768Mi"
    cpu: "400m"
