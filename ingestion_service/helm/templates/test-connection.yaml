apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "ingestion-service.fullname" . }}-test-connection"
  labels:
    app: {{ include "ingestion-service.fullname" . }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ["wget"]
      args: ["{{ include "ingestion-service.fullname" . }}:{{ .Values.service.healthPort }}/health"]
  restartPolicy: Never
