image:
  repository: 385800116362.dkr.ecr.eu-west-1.amazonaws.com/bighill/mlops
  tag: "ingestion-service-0.0.1-staging"
  pullPolicy: Always

serviceAccount:
  create: true
  name: "ingestion-service"
  annotations: {}

ingress:
  enabled: true
  host: "ingestion.internal.bighill.example"

env:
  environment: "staging"
  kafkaBroker: "kafka.bighill-staging.svc.cluster.local:9092"
  redisAddress: "redis.bighill-staging.svc.cluster.local:6379"
  topic: "ingestion"
  dataRegistrySubscriberTopic: "data_registry"
  dlq: "http://localhost:4566/ingestion-dev-env-queue/"
  outbox: "postgres"
  authKmsKeyId: "alias/bighill-staging-jwt-signing"
  outboxRelayPollMs: "250"
  outboxRelayBatchSize: "100"
  outboxRelayFailureBackoffMs: "2000"
  filesBucketName: "adt-datalake-rawdata-prod-255525589248-eu-west-1"
  filesBucketRegion: "eu-west-1"
  huggingFaceDownloadMode: "kubernetes"
  huggingFaceJobNamespace: "ml-ops-staging"
  huggingFaceJobImage: "training-jobs:0.0.1"
  huggingFaceJobImagePullPolicy: "Always"
  profileSubscriberTopic: "profile"
  otelExporterEndpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  dbCredentialsSecret:
    name: "aurora-creds-staging"
    userKey: "ingestion_db_user"
    passwordKey: "ingestion_db_password"
    hostKey: "pg_host"
    portKey: "pg_port"
    sslmodeKey: "pg_sslmode"
    nameKey: "ingestion_db_name"
