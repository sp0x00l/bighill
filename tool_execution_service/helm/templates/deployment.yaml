apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tool-execution-service.fullname" . }}
  labels:
    app: {{ include "tool-execution-service.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "tool-execution-service.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "tool-execution-service.fullname" . }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default "tool-execution-service" }}
      {{- end }}
      containers:
        - name: {{ include "tool-execution-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: {{ .Values.env.environment | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.otelExporterEndpoint | quote }}
            - name: TOOL_EXECUTION_SERVICE_NAME
              value: {{ .Values.env.serviceName | quote }}
            - name: TOOL_EXECUTION_SERVICE_BUILD_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: TOOL_EXECUTION_SERVICE_DB_NAME
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.nameKey }}
{{- else }}
              value: {{ .Values.env.dbName | quote }}
{{- end }}
            - name: TOOL_EXECUTION_SERVICE_DB_USER
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.userKey }}
{{- else }}
              value: {{ .Values.env.dbUser | quote }}
{{- end }}
            - name: TOOL_EXECUTION_SERVICE_DB_PASSWORD
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.passwordKey }}
{{- else }}
              value: {{ .Values.env.dbPassword | quote }}
{{- end }}
            - name: TOOL_EXECUTION_SERVICE_DB_MAX_CONNECTIONS
              value: {{ .Values.env.dbMaxConnections | quote }}
            - name: PGHOST
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.hostKey }}
{{- else }}
              value: {{ .Values.env.pgHost | quote }}
{{- end }}
            - name: PGPORT
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.portKey }}
{{- else }}
              value: {{ .Values.env.pgPort | quote }}
{{- end }}
            - name: PGSSLMODE
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.sslmodeKey }}
{{- else }}
              value: {{ .Values.env.pgSslMode | quote }}
{{- end }}
            - name: TOOL_EXECUTION_SERVICE_GRPC_PORT
              value: {{ .Values.service.grpcPort | quote }}
            - name: TOOL_EXECUTION_SERVICE_HEALTHCHECK_PORT
              value: {{ .Values.service.healthPort | quote }}
            - name: TOOL_EXECUTION_SERVICE_HTTP_TOOL_ALLOWED_HOSTS
              value: {{ .Values.env.httpToolAllowedHosts | quote }}
            - name: TOOL_EXECUTION_SERVICE_ALLOWED_ORG_IDS
              value: {{ .Values.env.allowedOrgIds | quote }}
            - name: TOOL_EXECUTION_SERVICE_HTTP_TOOL_TIMEOUT_MS
              value: {{ .Values.env.httpToolTimeoutMs | quote }}
            - name: TOOL_EXECUTION_SERVICE_HTTP_TOOL_MAX_RESPONSE_BYTES
              value: {{ .Values.env.httpToolMaxResponseBytes | quote }}
            - name: TOOL_EXECUTION_SERVICE_PINNED_MCP_SERVER_ENDPOINT
              value: {{ .Values.env.pinnedMcpServerEndpoint | quote }}
            - name: TOOL_EXECUTION_SERVICE_PINNED_MCP_SERVER_TRANSPORT
              value: {{ .Values.env.pinnedMcpServerTransport | quote }}
            - name: TOOL_EXECUTION_SERVICE_PINNED_MCP_TOOL_NAMES
              value: {{ .Values.env.pinnedMcpToolNames | quote }}
            - name: TOOL_EXECUTION_SERVICE_PINNED_MCP_CREDENTIAL_REF
              value: {{ .Values.env.pinnedMcpCredentialRef | quote }}
            - name: TOOL_EXECUTION_SERVICE_PINNED_MCP_ALLOWED_ORG_IDS
              value: {{ .Values.env.pinnedMcpAllowedOrgIds | quote }}
{{- if and .Values.env.pinnedMcpCredentialRef .Values.env.pinnedMcpCredentialSecret.name .Values.env.pinnedMcpCredentialSecret.key }}
            - name: {{ .Values.env.pinnedMcpCredentialRef | quote }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.pinnedMcpCredentialSecret.name }}
                  key: {{ .Values.env.pinnedMcpCredentialSecret.key }}
{{- end }}
            - name: TOOL_EXECUTION_SERVICE_HEALTHCHECK_CPU_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckCpuThreshold | quote }}
            - name: TOOL_EXECUTION_SERVICE_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckFreeMemThreshold | quote }}
            - name: TOOL_EXECUTION_SERVICE_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckDbLatencyThreshold | quote }}
            - name: TOOL_EXECUTION_SERVICE_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckServiceLatencyThreshold | quote }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
