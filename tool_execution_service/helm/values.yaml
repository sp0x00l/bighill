replicaCount: 1
image:
  repository: "tool-execution-service"
  tag: "0.0.1"
  pullPolicy: IfNotPresent
serviceAccount:
  create: false
  name: "tool-execution-service"
  annotations: {}
service:
  type: ClusterIP
  healthPort: 5065
  grpcPort: 7084
env:
  environment: "local-dev"
  serviceName: "tool-execution-service"
  otelExporterEndpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  dbCredentialsSecret:
    name: ""
    userKey: "bighill_tool_execution_db_user"
    passwordKey: "bighill_tool_execution_db_password"
    hostKey: "pg_host"
    portKey: "pg_port"
    sslmodeKey: "pg_sslmode"
    nameKey: "bighill_tool_execution_db"
  dbName: "bighill_tool_execution_db"
  dbUser: "bighill_tool_execution_db_user"
  dbPassword: ""
  dbMaxConnections: "20"
  pgHost: "localhost"
  pgPort: "5432"
  pgSslMode: "require"
  httpToolAllowedHosts: "localhost,127.0.0.1"
  allowedOrgIds: ""
  httpToolTimeoutMs: "1500"
  httpToolMaxResponseBytes: "65536"
  pinnedMcpServerEndpoint: ""
  pinnedMcpServerTransport: "http"
  pinnedMcpToolNames: ""
  pinnedMcpCredentialRef: ""
  pinnedMcpCredentialSecret:
    name: ""
    key: ""
  pinnedMcpAllowedOrgIds: ""
  healthcheckCpuThreshold: "80"
  healthcheckFreeMemThreshold: "20"
  healthcheckDbLatencyThreshold: "5"
  healthcheckServiceLatencyThreshold: "5"
resources:
  requests:
    memory: "64Mi"
    cpu: "25m"
  limits:
    memory: "128Mi"
    cpu: "100m"
