apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "data-ingestion-service.fullname" . }}
  labels:
    app: {{ include "data-ingestion-service.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "data-ingestion-service.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "data-ingestion-service.fullname" . }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default "data-ingestion-service" }}
      {{- end }}
      containers:
        - name: {{ include "data-ingestion-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: {{ .Values.env.environment | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.otelExporterEndpoint | quote }}
            - name: DATA_INGESTION_SERVICE_NAME
              value: {{ .Values.env.serviceName | quote }}
            - name: DATA_INGESTION_SERVICE_BUILD_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: DATA_INGESTION_SERVICE_API_HTTP_PORT
              value: {{ .Values.service.httpPort | quote }}
            - name: DATA_INGESTION_SERVICE_REDIS_ADDRESS
              value: {{ .Values.env.redisAddress | quote }}
            - name: DATA_INGESTION_SERVICE_REDIS_USERNAME
              value: {{ .Values.env.redisUsername | quote }}
            - name: DATA_INGESTION_SERVICE_REDIS_PASSWORD
              value: {{ .Values.env.redisPassword | quote }}
            - name: DATA_INGESTION_SERVICE_FILES_BUCKET_NAME
              value: {{ .Values.env.filesBucketName | quote }}
            - name: DATA_INGESTION_SERVICE_FILES_BUCKET_REGION
              value: {{ .Values.env.filesBucketRegion | quote }}
            - name: DATA_INGESTION_SERVICE_FILE_MAX_SIZE_MB
              value: {{ .Values.env.fileMaxSizeMb | quote }}
            - name: DATA_INGESTION_SERVICE_DIRECT_UPLOAD_MAX_SIZE_MB
              value: {{ .Values.env.directUploadMaxSizeMb | quote }}
            - name: DATA_INGESTION_SERVICE_UPLOAD_SESSION_TTL_SECONDS
              value: {{ .Values.env.uploadSessionTtlSeconds | quote }}
            - name: DATA_INGESTION_SERVICE_UPLOAD_VALIDATION_READ_MAX_SIZE_MB
              value: {{ .Values.env.uploadValidationReadMaxSizeMb | quote }}
            - name: DATA_INGESTION_SERVICE_FILES_UPLOAD_PART_SIZE_MB
              value: {{ .Values.env.filesUploadPartSizeMb | quote }}
            - name: DATA_INGESTION_SERVICE_DB_NAME
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.nameKey }}
{{- else }}
              value: {{ .Values.env.dbName | quote }}
{{- end }}
            - name: DATA_INGESTION_SERVICE_DB_USER
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.userKey }}
{{- else }}
              value: {{ .Values.env.dbUser | quote }}
{{- end }}
            - name: DATA_INGESTION_SERVICE_DB_PASSWORD
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.passwordKey }}
{{- else }}
              value: {{ .Values.env.dbPassword | quote }}
{{- end }}
            - name: DATA_INGESTION_SERVICE_DB_MAX_CONNECTIONS
              value: {{ .Values.env.dbMaxConnections | quote }}
            - name: SHARED_LIB_DB_STATEMENT_TIMEOUT_MS
              value: {{ .Values.env.sharedLibDbStatementTimeoutMs | quote }}
            - name: SHARED_LIB_DB_LOCK_TIMEOUT_MS
              value: {{ .Values.env.sharedLibDbLockTimeoutMs | quote }}
            - name: SHARED_LIB_DB_IDLE_IN_TX_TIMEOUT_MS
              value: {{ .Values.env.sharedLibDbIdleInTxTimeoutMs | quote }}
            - name: PGHOST
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.hostKey }}
{{- else }}
              value: {{ .Values.env.pgHost | quote }}
{{- end }}
            - name: PGPORT
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.portKey }}
{{- else }}
              value: {{ .Values.env.pgPort | quote }}
{{- end }}
            - name: PGSSLMODE
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.sslmodeKey }}
{{- else }}
              value: {{ .Values.env.pgSslMode | quote }}
{{- end }}
            - name: KAFKA_BROKER
              value: {{ .Values.env.kafkaBroker | quote }}
            - name: DATA_INGESTION_SERVICE_KAFKA_BASE_GROUP_ID
              value: {{ .Values.env.kafkaBaseGroupId | quote }}
            - name: DATA_INGESTION_SERVICE_KAFKA_AUTO_OFFSET_RESET
              value: {{ .Values.env.kafkaAutoOffsetReset | quote }}
            - name: DATA_INGESTION_SERVICE_TOPIC
              value: {{ .Values.env.topic | quote }}
            - name: DATA_INGESTION_SERVICE_DATA_REGISTRY_SUBSCRIBER_TOPIC
              value: {{ .Values.env.dataRegistrySubscriberTopic | quote }}
            - name: DATA_INGESTION_SERVICE_DLQ
              value: {{ .Values.env.dlq | quote }}
            - name: DATA_INGESTION_SERVICE_OUTBOX
              value: {{ .Values.env.outbox | quote }}
            - name: DATA_INGESTION_SERVICE_OUTBOX_RELAY_POLL_MS
              value: {{ .Values.env.outboxRelayPollMs | quote }}
            - name: DATA_INGESTION_SERVICE_OUTBOX_RELAY_BATCH_SIZE
              value: {{ .Values.env.outboxRelayBatchSize | quote }}
            - name: DATA_INGESTION_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS
              value: {{ .Values.env.outboxRelayFailureBackoffMs | quote }}
            - name: DATA_INGESTION_SERVICE_HEALTHCHECK_CPU_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckCpuThreshold | quote }}
            - name: DATA_INGESTION_SERVICE_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckFreeMemThreshold | quote }}
            - name: DATA_INGESTION_SERVICE_HEALTHCHECK_PORT
              value: {{ .Values.service.healthPort | quote }}
            - name: DATA_INGESTION_SERVICE_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckServiceLatencyThreshold | quote }}
            - name: DATA_INGESTION_SERVICE_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckDbLatencyThreshold | quote }}
            - name: DATA_INGESTION_SERVICE_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckMessageBrokerLatencyThreshold | quote }}
            - name: DATA_INGESTION_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_POLL_SILENCE_SECONDS
              value: {{ .Values.env.healthcheckMessageBrokerSubscriberMaxPollSilence | quote }}
            - name: DATA_INGESTION_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_PROGRESS_SILENCE_SECONDS
              value: {{ .Values.env.healthcheckMessageBrokerSubscriberMaxProgressSilence | quote }}
            - name: DATA_INGESTION_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_LAG
              value: {{ .Values.env.healthcheckMessageBrokerSubscriberMaxLag | quote }}
            {{- if .Values.env.authKmsKeyId }}
            - name: AUTH_KMS_KEY_ID
              value: {{ .Values.env.authKmsKeyId | quote }}
            {{- end }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
