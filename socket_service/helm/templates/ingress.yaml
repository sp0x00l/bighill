{{- if and .Values.ingress.enabled (eq .Values.service.type "ClusterIP") }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "socket-service.fullname" . }}-ingress
  labels:
    app: {{ include "socket-service.fullname" . }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: "{{ .Values.service.healthPort }}"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingress.host }}
{{- if .Values.ingress.certificateArn }}
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn }}
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
{{- end }}
spec:
  ingressClassName: alb
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /v1/socket
            pathType: Prefix
            backend:
              service:
                name: {{ include "socket-service.fullname" . }}
                port:
                  name: http
  {{- if .Values.ingress.certificateArn }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ include "socket-service.fullname" . }}-tls-placeholder
  {{- end }}
{{- end }}
