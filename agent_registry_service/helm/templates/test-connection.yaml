apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "agent-registry-service.fullname" . }}-test-connection"
  labels:
    app: {{ include "agent-registry-service.fullname" . }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl
      command: ['curl']
      args: ['{{ include "agent-registry-service.fullname" . }}:{{ .Values.service.healthPort }}/health']
  restartPolicy: Never
