apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inference-service.fullname" . }}
  labels:
    app: {{ include "inference-service.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "inference-service.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "inference-service.fullname" . }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.lifecycle.terminationGracePeriodSeconds | default 45 }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default "inference-service" }}
      {{- end }}
      containers:
        - name: {{ include "inference-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: {{ .Values.env.environment | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.otelExporterEndpoint | quote }}
            - name: INFERENCE_SERVICE_NAME
              value: {{ .Values.env.serviceName | quote }}
            - name: INFERENCE_SERVICE_BUILD_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: INFERENCE_SERVICE_LIFECYCLE_READINESS_TIMEOUT_SECONDS
              value: {{ .Values.lifecycle.readinessTimeoutSeconds | quote }}
            - name: INFERENCE_SERVICE_LIFECYCLE_DRAIN_TIMEOUT_SECONDS
              value: {{ .Values.lifecycle.drainTimeoutSeconds | quote }}
            - name: INFERENCE_SERVICE_LIFECYCLE_CLOSE_TIMEOUT_SECONDS
              value: {{ .Values.lifecycle.closeTimeoutSeconds | quote }}
            - name: INFERENCE_SERVICE_DB_NAME
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.nameKey }}
{{- else }}
              value: {{ .Values.env.dbName | quote }}
{{- end }}
            - name: INFERENCE_SERVICE_DB_USER
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.userKey }}
{{- else }}
              value: {{ .Values.env.dbUser | quote }}
{{- end }}
            - name: INFERENCE_SERVICE_DB_PASSWORD
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.passwordKey }}
{{- else }}
              value: {{ .Values.env.dbPassword | quote }}
{{- end }}
            - name: INFERENCE_SERVICE_DB_MAX_CONNECTIONS
              value: {{ .Values.env.dbMaxConnections | quote }}
            - name: PGHOST
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.hostKey }}
{{- else }}
              value: {{ .Values.env.pgHost | quote }}
{{- end }}
            - name: PGPORT
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.portKey }}
{{- else }}
              value: {{ .Values.env.pgPort | quote }}
{{- end }}
            - name: PGSSLMODE
{{- if .Values.env.dbCredentialsSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.env.dbCredentialsSecret.name }}
                  key: {{ .Values.env.dbCredentialsSecret.sslmodeKey }}
{{- else }}
              value: {{ .Values.env.pgSslMode | quote }}
{{- end }}
            - name: KAFKA_BROKER
              value: {{ .Values.env.kafkaBroker | quote }}
            - name: INFERENCE_SERVICE_KAFKA_BASE_GROUP_ID
              value: {{ .Values.env.kafkaBaseGroupId | quote }}
            - name: INFERENCE_SERVICE_KAFKA_AUTO_OFFSET_RESET
              value: {{ .Values.env.kafkaAutoOffsetReset | quote }}
            - name: INFERENCE_SERVICE_MODEL_REGISTRY_SUBSCRIBER_TOPIC
              value: {{ .Values.env.modelRegistrySubscriberTopic | quote }}
            - name: INFERENCE_SERVICE_DATA_REGISTRY_SUBSCRIBER_TOPIC
              value: {{ .Values.env.dataRegistrySubscriberTopic | quote }}
            - name: INFERENCE_SERVICE_TENANT_SUBSCRIBER_TOPIC
              value: {{ .Values.env.profileSubscriberTopic | quote }}
            - name: INFERENCE_SERVICE_PREFERENCE_DATASET_TOPIC
              value: {{ .Values.env.preferenceDatasetTopic | quote }}
            - name: INFERENCE_SERVICE_OUTBOX
              value: {{ .Values.env.outbox | quote }}
            - name: INFERENCE_SERVICE_OUTBOX_RELAY_POLL_MS
              value: {{ .Values.env.outboxRelayPollMs | quote }}
            - name: INFERENCE_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS
              value: {{ .Values.env.outboxRelayFailureBackoffMs | quote }}
            - name: INFERENCE_SERVICE_OUTBOX_RELAY_BATCH_SIZE
              value: {{ .Values.env.outboxRelayBatchSize | quote }}
            - name: INFERENCE_SERVICE_DLQ
              value: {{ .Values.env.dlq | quote }}
            - name: INFERENCE_SERVICE_API_GRPC_PORT
              value: {{ .Values.service.grpcPort | quote }}
            - name: INFERENCE_SERVICE_API_HTTP_PORT
              value: {{ .Values.service.httpPort | quote }}
            - name: INFERENCE_SERVICE_FEATURE_MATERIALIZER_GRPC_ADDRESS
              value: {{ .Values.env.featureMaterializerGrpcAddress | quote }}
            - name: INFERENCE_SERVICE_FEATURE_MATERIALIZER_GRPC_DIAL_TIMEOUT_MS
              value: {{ .Values.env.featureMaterializerGrpcDialTimeoutMs | quote }}
            - name: INFERENCE_SERVICE_FEATURE_MATERIALIZER_GRPC_CALL_TIMEOUT_MS
              value: {{ .Values.env.featureMaterializerGrpcCallTimeoutMs | quote }}
            - name: INFERENCE_SERVICE_FEATURE_MATERIALIZER_GRPC_RETRY_COUNT
              value: {{ .Values.env.featureMaterializerGrpcRetryCount | quote }}
            - name: INFERENCE_SERVICE_GENERATION_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.env.generationRequestTimeoutSeconds | quote }}
            - name: INFERENCE_SERVICE_GENERATION_MAX_OUTPUT_TOKENS
              value: {{ .Values.env.generationMaxOutputTokens | quote }}
            - name: INFERENCE_SERVICE_RERANKER_PROVIDER
              value: {{ .Values.env.rerankerProvider | quote }}
            - name: INFERENCE_SERVICE_RERANKER_URL
              value: {{ .Values.env.rerankerUrl | quote }}
            - name: INFERENCE_SERVICE_RERANKER_MODEL
              value: {{ .Values.env.rerankerModel | quote }}
            - name: INFERENCE_SERVICE_RERANKER_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.env.rerankerRequestTimeoutSeconds | quote }}
            - name: INFERENCE_SERVICE_RERANKER_CANDIDATE_MULTIPLIER
              value: {{ .Values.env.rerankerCandidateMultiplier | quote }}
            - name: INFERENCE_SERVICE_RAG_MERGE_STRATEGY
              value: {{ .Values.env.ragMergeStrategy | quote }}
            - name: INFERENCE_SERVICE_QUERY_TRANSFORMER_PROVIDER
              value: {{ .Values.env.queryTransformerProvider | quote }}
            - name: INFERENCE_SERVICE_QUERY_TRANSFORMER_REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.env.queryTransformerRequestTimeoutSeconds | quote }}
            - name: INFERENCE_SERVICE_PREFERENCE_DATASET_EXPORT_ENABLED
              value: {{ .Values.env.preferenceDatasetExportEnabled | quote }}
            - name: INFERENCE_SERVICE_PREFERENCE_DATASET_URI_TEMPLATE
              value: {{ .Values.env.preferenceDatasetUriTemplate | quote }}
            - name: INFERENCE_SERVICE_PREFERENCE_DATASET_MIN_EXAMPLES
              value: {{ .Values.env.preferenceDatasetMinExamples | quote }}
            - name: INFERENCE_SERVICE_PREFERENCE_DATASET_LIMIT
              value: {{ .Values.env.preferenceDatasetLimit | quote }}
            - name: INFERENCE_SERVICE_PREFERENCE_DATASET_BUCKET_REGION
              value: {{ .Values.env.preferenceDatasetBucketRegion | quote }}
            - name: INFERENCE_SERVICE_PREFERENCE_DATASET_UPLOAD_PART_SIZE_MB
              value: {{ .Values.env.preferenceDatasetUploadPartSizeMb | quote }}
            - name: INFERENCE_SERVICE_PROMPT_STRATEGY_VERSION
              value: {{ .Values.env.promptStrategyVersion | quote }}
            - name: INFERENCE_SERVICE_PROMPT_MAX_CONTEXT_TOKENS
              value: {{ .Values.env.promptMaxContextTokens | quote }}
            - name: INFERENCE_SERVICE_PROMPT_MAX_CONTEXT_CHUNKS
              value: {{ .Values.env.promptMaxContextChunks | quote }}
            - name: INFERENCE_SERVICE_HEALTHCHECK_CPU_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckCpuThreshold | quote }}
            - name: INFERENCE_SERVICE_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckFreeMemThreshold | quote }}
            - name: INFERENCE_SERVICE_HEALTHCHECK_PORT
              value: {{ .Values.service.healthPort | quote }}
            - name: INFERENCE_SERVICE_HEALTHCHECK_DB_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckDbLatencyThreshold | quote }}
            - name: INFERENCE_SERVICE_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckServiceLatencyThreshold | quote }}
            - name: INFERENCE_SERVICE_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckMessageBrokerLatencyThreshold | quote }}
            - name: INFERENCE_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_POLL_SILENCE_SECONDS
              value: {{ .Values.env.healthcheckMessageBrokerSubscriberMaxPollSilence | quote }}
            - name: INFERENCE_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_PROGRESS_SILENCE_SECONDS
              value: {{ .Values.env.healthcheckMessageBrokerSubscriberMaxProgressSilence | quote }}
            - name: INFERENCE_SERVICE_HEALTHCHECK_MESSAGE_BROKER_SUBSCRIBER_MAX_LAG
              value: {{ .Values.env.healthcheckMessageBrokerSubscriberMaxLag | quote }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
