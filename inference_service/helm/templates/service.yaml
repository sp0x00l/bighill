apiVersion: v1
kind: Service
metadata:
  name: {{ include "inference-service.fullname" . }}
  labels:
    app: {{ include "inference-service.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: health
      port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
  selector:
    app: {{ include "inference-service.fullname" . }}
