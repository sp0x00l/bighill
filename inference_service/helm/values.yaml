replicaCount: 1
image:
  repository: "inference-service"
  tag: "0.0.1"
  pullPolicy: IfNotPresent
serviceAccount:
  create: false
  name: "inference-service"
  annotations: {}
service:
  type: ClusterIP
  healthPort: 5059
  httpPort: 8087
  grpcPort: 7073
lifecycle:
  terminationGracePeriodSeconds: 45
  readinessTimeoutSeconds: "30"
  drainTimeoutSeconds: "30"
  closeTimeoutSeconds: "10"
ingress:
  enabled: false
  host: ""
  certificateArn: ""
env:
  environment: "local-dev"
  serviceName: "inference-service"
  otelExporterEndpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  dbCredentialsSecret:
    name: ""
    userKey: "bighill_inference_db_user"
    passwordKey: "bighill_inference_db_password"
    hostKey: "pg_host"
    portKey: "pg_port"
    sslmodeKey: "pg_sslmode"
    nameKey: "bighill_inference_db"
  dbName: "bighill_inference_db"
  dbUser: "bighill_inference_db_user"
  dbPassword: ""
  dbMaxConnections: "20"
  pgHost: "localhost"
  pgPort: "5432"
  pgSslMode: "require"
  kafkaBroker: "kafka:9092"
  kafkaBaseGroupId: "inference"
  kafkaAutoOffsetReset: "earliest"
  modelRegistrySubscriberTopic: "model_registry"
  dataRegistrySubscriberTopic: "data_registry"
  profileSubscriberTopic: "profile"
  preferenceDatasetTopic: "inference"
  outbox: "postgres"
  outboxRelayPollMs: "250"
  outboxRelayFailureBackoffMs: "2000"
  outboxRelayBatchSize: "100"
  dlq: "http://localhost:4566/inference-dev-env-queue/"
  featureMaterializerGrpcAddress: "feature-materializer-service:7072"
  featureMaterializerGrpcDialTimeoutMs: "500"
  featureMaterializerGrpcCallTimeoutMs: "15000"
  featureMaterializerGrpcRetryCount: "3"
  generationRequestTimeoutSeconds: "60"
  generationMaxOutputTokens: "256"
  rerankerProvider: "tei"
  rerankerUrl: "http://text-embeddings-inference-reranker:80"
  rerankerModel: "bge-reranker-large"
  rerankerRequestTimeoutSeconds: "30"
  rerankerCandidateMultiplier: "5"
  ragMergeStrategy: "reranker"
  queryTransformerProvider: ""
  queryTransformerRequestTimeoutSeconds: "30"
  preferenceDatasetExportEnabled: "false"
  preferenceDatasetUriTemplate: "s3://local-dev-bucket/preferences/{dataset_id}/{preference_dataset_id}.jsonl"
  preferenceDatasetMinExamples: "1"
  preferenceDatasetLimit: "1000"
  preferenceDatasetBucketRegion: "eu-west-1"
  preferenceDatasetUploadPartSizeMb: "10"
  promptStrategyVersion: "rag-prompt-v1"
  promptMaxContextTokens: "3000"
  promptMaxContextChunks: "8"
  healthcheckCpuThreshold: "80"
  healthcheckFreeMemThreshold: "20"
  healthcheckDbLatencyThreshold: "5"
  healthcheckServiceLatencyThreshold: "5"
  healthcheckMessageBrokerLatencyThreshold: "5"
  healthcheckMessageBrokerSubscriberMaxPollSilence: "30"
  healthcheckMessageBrokerSubscriberMaxProgressSilence: "90"
  healthcheckMessageBrokerSubscriberMaxLag: "100000"
resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"
