apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tool-service.fullname" . }}
  labels:
    app: {{ include "tool-service.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "tool-service.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "tool-service.fullname" . }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default "tool-service" }}
      {{- end }}
      containers:
        - name: {{ include "tool-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: {{ .Values.env.environment | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.otelExporterEndpoint | quote }}
            - name: TOOL_SERVICE_NAME
              value: {{ .Values.env.serviceName | quote }}
            - name: TOOL_SERVICE_BUILD_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: TOOL_SERVICE_GRPC_PORT
              value: {{ .Values.service.grpcPort | quote }}
            - name: TOOL_SERVICE_HEALTHCHECK_PORT
              value: {{ .Values.service.healthPort | quote }}
            - name: TOOL_SERVICE_HTTP_TOOL_ALLOWED_HOSTS
              value: {{ .Values.env.httpToolAllowedHosts | quote }}
            - name: TOOL_SERVICE_ALLOWED_ORG_IDS
              value: {{ .Values.env.allowedOrgIds | quote }}
            - name: TOOL_SERVICE_HTTP_TOOL_TIMEOUT_MS
              value: {{ .Values.env.httpToolTimeoutMs | quote }}
            - name: TOOL_SERVICE_HTTP_TOOL_MAX_RESPONSE_BYTES
              value: {{ .Values.env.httpToolMaxResponseBytes | quote }}
            - name: TOOL_SERVICE_HEALTHCHECK_CPU_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckCpuThreshold | quote }}
            - name: TOOL_SERVICE_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckFreeMemThreshold | quote }}
            - name: TOOL_SERVICE_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckServiceLatencyThreshold | quote }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
