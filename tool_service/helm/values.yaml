replicaCount: 1
image:
  repository: "tool-service"
  tag: "0.0.1"
  pullPolicy: IfNotPresent
serviceAccount:
  create: false
  name: "tool-service"
  annotations: {}
service:
  type: ClusterIP
  healthPort: 5065
  grpcPort: 7084
env:
  environment: "local-dev"
  serviceName: "tool-service"
  otelExporterEndpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  httpToolAllowedHosts: "localhost,127.0.0.1"
  allowedOrgIds: ""
  httpToolTimeoutMs: "1500"
  httpToolMaxResponseBytes: "65536"
  healthcheckCpuThreshold: "80"
  healthcheckFreeMemThreshold: "20"
  healthcheckServiceLatencyThreshold: "5"
resources:
  requests:
    memory: "64Mi"
    cpu: "25m"
  limits:
    memory: "128Mi"
    cpu: "100m"
