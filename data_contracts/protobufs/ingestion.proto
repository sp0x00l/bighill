syntax = "proto3";

package ingestion;

option go_package = "lib/data_contracts_lib/ingestion";

message DatasetFileUploadedEvent {
  string dataset_id = 1;
  string user_id = 2;
  string storage_location = 3;
  string content_type = 4;
  string file_extension = 5;
  string table_namespace = 6;
  string table_name = 7;
  string table_format = 8;
  string catalog_provider = 9;
  string processing_profile = 10;
  string source_type = 11;
  string source_connector_id = 12;
  string source_query = 13;
  string source_database = 14;
  string source_collection = 15;
  string org_id = 16;
}

message ModelArtifactIngestedEvent {
  string artifact_id = 1;
  string user_id = 2;
  string upload_id = 3;
  string source = 4;
  string storage_location = 5;
  string manifest_location = 6;
  string artifact_type = 7;
  string artifact_format = 8;
  int64 artifact_size_bytes = 9;
  string artifact_checksum = 10;
  string file_name = 11;
  string model_name = 12;
  string model_version = 13;
  string base_model = 14;
  string content_type = 15;
  string source_uri = 16;
  string hf_repo_id = 17;
  string hf_revision = 18;
  string hf_commit_sha = 19;
  string created_at = 20;
  string source_metadata = 21;
  string dataset_id = 22;
  string org_id = 23;
}
