syntax = "proto3";

package dataset;
 
option go_package = "lib/data_contracts_lib/dataset";

message Dataset {  
  string dataset_id = 1;
  string user_id = 2;
}

message DatasetFileUploadedEvent {
  string dataset_id = 1;
  string user_id = 2;
  string storage_location = 3;
  string content_type = 4;
  string file_extension = 5;
  string table_namespace = 6;
  string table_name = 7;
  string table_format = 8;
  string catalog_provider = 9;
}
