syntax = "proto3";
package training;
option go_package = "lib/data_contracts_lib/training";

message ModelTrainingCompletedEvent {
  string training_run_id = 1;
  string dataset_id = 2;
  string dataset_version = 3;
  string feature_snapshot_id = 4;
  string model_name = 5;
  string model_version = 6;
  string base_model = 7;
  string artifact_location = 8;
  string artifact_format = 9;
  string artifact_checksum = 10;
  int64 artifact_size_bytes = 11;
  string metrics_metadata = 12;
  string report_location = 13;
}

message ModelTrainingFailedEvent {
  string training_run_id = 1;
  string dataset_id = 2;
  string dataset_version = 3;
  string feature_snapshot_id = 4;
  string model_name = 5;
  string model_version = 6;
  string base_model = 7;
  string failure_reason = 8;
}
