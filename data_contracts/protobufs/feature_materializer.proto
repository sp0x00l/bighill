syntax = "proto3";

package feature_materializer;

option go_package = "lib/data_contracts_lib/feature_materializer";

service FeatureMaterializerService {
  rpc SearchEmbeddings(SearchEmbeddingsRequest) returns (SearchEmbeddingsResponse);
}

message RawSnapshotReadyEvent {
  string dataset_id = 1;
  int64 materialization_event_seq = 2;
  string raw_snapshot_id = 3;
  string user_id = 4;
  string org_id = 5;
  string storage_location = 6;
  string table_namespace = 7;
  string table_name = 8;
  string table_format = 9;
  string catalog_provider = 10;
  int32 schema_version = 11;
  string schema_metadata = 12;
  string processing_profile = 13;
}

message FeatureSnapshotReadyEvent {
  string dataset_id = 1;
  int64 materialization_event_seq = 2;
  string raw_snapshot_id = 3;
  string feature_snapshot_id = 4;
  string user_id = 5;
  string org_id = 6;
  string storage_location = 7;
  string table_namespace = 8;
  string table_name = 9;
  string table_format = 10;
  string catalog_provider = 11;
  int32 schema_version = 12;
  string schema_metadata = 13;
  string processing_profile = 14;
}

message EmbeddingSnapshotReadyEvent {
  string dataset_id = 1;
  int64 materialization_event_seq = 2;
  string feature_snapshot_id = 3;
  string embedding_snapshot_id = 4;
  string user_id = 5;
  string org_id = 6;
  string vector_store = 7;
  string collection_name = 8;
  int32 embedding_dimensions = 9;
  int64 embedding_count = 10;
  string strategy_version = 11;
  string chunker_name = 12;
  string chunker_version = 13;
  int32 chunk_size = 14;
  int32 chunk_overlap = 15;
  string embedding_provider = 16;
  string embedding_model = 17;
}

message SearchEmbeddingsRequest {
  string dataset_id = 1;
  string user_id = 2;
  string query_text = 3;
  int32 top_k = 4;
  map<string, string> metadata_filters = 5;
  string org_id = 6;
}

message SearchEmbeddingsResponse {
  string dataset_id = 1;
  string embedding_snapshot_id = 2;
  string feature_snapshot_id = 3;
  string vector_store = 4;
  string collection_name = 5;
  int32 embedding_dimensions = 6;
  string strategy_version = 7;
  string chunker_name = 8;
  string chunker_version = 9;
  int32 chunk_size = 10;
  int32 chunk_overlap = 11;
  string embedding_provider = 12;
  string embedding_model = 13;
  repeated EmbeddingSearchMatch matches = 14;
  string org_id = 15;
}

message EmbeddingSearchMatch {
  string embedding_record_id = 1;
  string embedding_snapshot_id = 2;
  string dataset_id = 3;
  int32 chunk_index = 4;
  string source_text = 5;
  double distance = 6;
  double similarity = 7;
  string org_id = 8;
}
