syntax = "proto3";

package feature_materializer;

option go_package = "lib/data_contracts_lib/feature_materializer";

service FeatureMaterializerService {
  rpc SearchEmbeddings(SearchEmbeddingsRequest) returns (SearchEmbeddingsResponse);
  rpc SearchGraph(SearchGraphRequest) returns (SearchGraphResponse);
}

message RawSnapshotReadyEvent {
  string dataset_id = 1;
  int64 materialization_event_seq = 2;
  string raw_snapshot_id = 3;
  string user_id = 4;
  string org_id = 5;
  string storage_location = 6;
  string table_namespace = 7;
  string table_name = 8;
  string table_format = 9;
  string catalog_provider = 10;
  int32 schema_version = 11;
  string schema_metadata = 12;
  string processing_profile = 13;
}

message FeatureSnapshotReadyEvent {
  string dataset_id = 1;
  int64 materialization_event_seq = 2;
  string raw_snapshot_id = 3;
  string feature_snapshot_id = 4;
  string user_id = 5;
  string org_id = 6;
  string storage_location = 7;
  string table_namespace = 8;
  string table_name = 9;
  string table_format = 10;
  string catalog_provider = 11;
  int32 schema_version = 12;
  string schema_metadata = 13;
  string processing_profile = 14;
}

message EmbeddingSnapshotReadyEvent {
  string dataset_id = 1;
  int64 materialization_event_seq = 2;
  string feature_snapshot_id = 3;
  string embedding_snapshot_id = 4;
  string user_id = 5;
  string org_id = 6;
  string vector_store = 7;
  string collection_name = 8;
  int32 embedding_dimensions = 9;
  int64 embedding_count = 10;
  string strategy_version = 11;
  string chunker_name = 12;
  string chunker_version = 13;
  int32 chunk_size = 14;
  int32 chunk_overlap = 15;
  string embedding_provider = 16;
  string embedding_model = 17;
}

message GraphSnapshotReadyEvent {
  string dataset_id = 1;
  int64 materialization_event_seq = 2;
  string feature_snapshot_id = 3;
  string embedding_snapshot_id = 4;
  string graph_snapshot_id = 5;
  string user_id = 6;
  string org_id = 7;
  string provenance_hash = 8;
  string extraction_model = 9;
  string extraction_prompt_version = 10;
  string extraction_schema_version = 11;
  int64 chunk_count = 12;
  int64 chunks_processed = 13;
  int64 entity_count = 14;
  int64 edge_count = 15;
}

message SearchEmbeddingsRequest {
  string dataset_id = 1;
  string user_id = 2;
  string query_text = 3;
  int32 top_k = 4;
  map<string, string> metadata_filters = 5;
  string org_id = 6;
}

message SearchEmbeddingsResponse {
  string dataset_id = 1;
  string embedding_snapshot_id = 2;
  string feature_snapshot_id = 3;
  string vector_store = 4;
  string collection_name = 5;
  int32 embedding_dimensions = 6;
  string strategy_version = 7;
  string chunker_name = 8;
  string chunker_version = 9;
  int32 chunk_size = 10;
  int32 chunk_overlap = 11;
  string embedding_provider = 12;
  string embedding_model = 13;
  repeated EmbeddingSearchMatch matches = 14;
  string org_id = 15;
}

message EmbeddingSearchMatch {
  string embedding_record_id = 1;
  string embedding_snapshot_id = 2;
  string dataset_id = 3;
  int32 chunk_index = 4;
  string source_text = 5;
  double distance = 6;
  double similarity = 7;
  string org_id = 8;
}

message SearchGraphRequest {
  string dataset_id = 1;
  string user_id = 2;
  string org_id = 3;
  string query_text = 4;
  int32 top_k = 5;
  int32 max_hops = 6;
  string mode = 7;
}

message SearchGraphResponse {
  string dataset_id = 1;
  string graph_snapshot_id = 2;
  string feature_snapshot_id = 3;
  string embedding_snapshot_id = 4;
  string provenance_hash = 5;
  repeated GraphRetrievedContext contexts = 6;
  repeated GraphMatchedEntity matched_entities = 7;
  repeated GraphPath paths = 8;
  string org_id = 9;
  string mode = 10;
  repeated GraphCommunityReport community_reports = 11;
}

message GraphRetrievedContext {
  string graph_node_chunk_id = 1;
  string graph_node_id = 2;
  string embedding_record_id = 3;
  string embedding_snapshot_id = 4;
  string dataset_id = 5;
  int32 chunk_index = 6;
  string source_text = 7;
  double score = 8;
  string org_id = 9;
}

message GraphMatchedEntity {
  string graph_node_id = 1;
  string name = 2;
  string type = 3;
  string description = 4;
  double score = 5;
}

message GraphPath {
  repeated string graph_node_ids = 1;
  repeated string relation_types = 2;
  double score = 3;
}

message GraphCommunityReport {
  string graph_community_report_id = 1;
  string graph_community_id = 2;
  string graph_snapshot_id = 3;
  string dataset_id = 4;
  string org_id = 5;
  string community_key = 6;
  int32 level = 7;
  string title = 8;
  string summary = 9;
  string report_text = 10;
  double rank = 11;
  double score = 12;
}
