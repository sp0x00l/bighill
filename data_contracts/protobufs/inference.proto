syntax = "proto3";

package inference;

option go_package = "lib/data_contracts_lib/inference";

service InferenceService {
  rpc Generate(GenerateRequest) returns (GenerateResponse);
  rpc RecordFeedback(RecordFeedbackRequest) returns (RecordFeedbackResponse);
}

message GenerateRequest {
  string dataset_id = 1;
  string user_id = 2;
  string query_text = 3;
  int32 top_k = 4;
  string model_id = 5;
  string request_id = 6;
  map<string, string> metadata_filters = 7;
  string org_id = 8;
}

message GenerateResponse {
  string dataset_id = 1;
  repeated string dataset_ids = 2;
  string model_id = 3;
  string query_text = 4;
  string answer = 5;
  repeated RetrievedContext contexts = 6;
  string request_id = 7;
  string prompt_strategy_version = 8;
  string generation_protocol = 9;
  string generation_model = 10;
  string rag_merge_strategy = 11;
  string org_id = 12;
}

message RetrievedContext {
  string embedding_record_id = 1;
  string embedding_snapshot_id = 2;
  string dataset_id = 3;
  int32 chunk_index = 4;
  string source_text = 5;
  double distance = 6;
  double similarity = 7;
}

message RecordFeedbackRequest {
  string feedback_id = 1;
  string request_id = 2;
  string user_id = 3;
  bool accepted = 4;
  int32 rating = 5;
  string comment = 6;
  string preferred_answer = 7;
  string org_id = 8;
}

message RecordFeedbackResponse {
  string feedback_id = 1;
  string request_id = 2;
}
