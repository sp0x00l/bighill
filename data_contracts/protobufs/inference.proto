syntax = "proto3";

package inference;

option go_package = "lib/data_contracts_lib/inference";

service InferenceService {
  rpc Generate(GenerateRequest) returns (GenerateResponse);
  rpc RecordFeedback(RecordFeedbackRequest) returns (RecordFeedbackResponse);
  rpc ExportPreferenceDataset(ExportPreferenceDatasetRequest) returns (ExportPreferenceDatasetResponse);
}

message GenerateRequest {
  string dataset_id = 1;
  string query_text = 2;
  int32 top_k = 3;
  string model_id = 4;
  string request_id = 5;
  map<string, string> metadata_filters = 6;
}

message GenerateResponse {
  string dataset_id = 1;
  string model_id = 2;
  string query_text = 3;
  string answer = 4;
  repeated RetrievedContext contexts = 5;
  string request_id = 6;
  string prompt_strategy_version = 7;
  string generation_provider = 8;
  string generation_model = 9;
}

message RetrievedContext {
  string embedding_record_id = 1;
  string embedding_snapshot_id = 2;
  int32 chunk_index = 3;
  string source_text = 4;
  double distance = 5;
  double similarity = 6;
}

message RecordFeedbackRequest {
  string feedback_id = 1;
  string request_id = 2;
  string user_id = 3;
  bool accepted = 4;
  int32 rating = 5;
  string comment = 6;
  string preferred_answer = 7;
}

message RecordFeedbackResponse {
  string feedback_id = 1;
  string request_id = 2;
}

message ExportPreferenceDatasetRequest {
  string request_id = 1;
  string dataset_id = 2;
  string model_id = 3;
  string output_uri = 4;
  int32 min_examples = 5;
  int32 limit = 6;
}

message ExportPreferenceDatasetResponse {
  string request_id = 1;
  string dataset_id = 2;
  string model_id = 3;
  string output_uri = 4;
  int32 example_count = 5;
  bool exported = 6;
}
