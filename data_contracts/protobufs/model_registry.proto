syntax = "proto3";
package model_registry;
option go_package = "lib/data_contracts_lib/model_registry";

message ModelUpdatedEvent {
  string model_id = 1;
  string training_run_id = 2;
  string dataset_id = 3;
  string name = 4;
  int32 model_version = 5;
  string base_model = 6;
  string artifact_location = 7;
  string artifact_format = 8;
  string artifact_checksum = 9;
  int64 artifact_size_bytes = 10;
  string metrics_metadata = 11;
  string status = 12;
  string failure_reason = 13;
}
