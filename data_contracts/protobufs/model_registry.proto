syntax = "proto3";
package model_registry;
option go_package = "lib/data_contracts_lib/model_registry";

message ModelUpdatedEvent {
  string model_id = 1;
  string user_id = 2;
  string training_run_id = 3;
  string dataset_id = 4;
  string name = 5;
  int32 model_version = 6;
  string base_model = 7;
  string artifact_location = 8;
  string artifact_format = 9;
  string artifact_checksum = 10;
  int64 artifact_size_bytes = 11;
  string metrics_metadata = 12;
  string status = 13;
  string failure_reason = 14;
  string adapter_uri = 15;
  string serving_target = 16;
  string serving_model = 17;
  string serving_load_status = 18;
  string model_kind = 19;
  string source = 20;
  string source_uri = 21;
  string source_metadata = 22;
}
