apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "profile-service.fullname" . }}-test"
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl
      command: ['curl']
      args: ['{{ include "profile-service.fullname" . }}:{{ .Values.service.healthPort }}/health']
  restartPolicy: Never
