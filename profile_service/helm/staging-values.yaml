image:
  repository: 385800116362.dkr.ecr.eu-west-1.amazonaws.com/bighill/mlops
  tag: "profile-service-0.0.1-staging"
  pullPolicy: Always

serviceAccount:
  create: true
  name: "profile-service"
  # IRSA annotation - role ARN will be set via --set during deploy
  annotations: {}

ingress:
  enabled: true
  host: "profile.internal.bighill.example"

env:
  environment: "staging"
  kafkaBroker: "kafka:9092"
  redisAddress: "redis:6379"
  dlq: "https://sqs.eu-west-1.amazonaws.com/385800116362/bighill-staging-profile-dlq"
  outbox: "postgres"
  # KMS key for JWT signing - created by Terraform
  authKmsKeyId: "alias/bighill-staging-jwt-signing"
  emailValidationTtlMinutes: "60"
  otelExporterEndpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  dbCredentialsSecret:
    name: "aurora-creds-staging"
    userKey: "bighill_profile_db_user"
    passwordKey: "bighill_profile_db_password"
    hostKey: "pg_host"
    portKey: "pg_port"
    sslmodeKey: "pg_sslmode"
    nameKey: "bighill_profile_db"
  oauthCredentialsSecret:
    name: "profile-oauth-creds-staging"
    googleClientIdKey: "google_client_id"
    googleClientSecretKey: "google_client_secret"
    discordClientIdKey: "discord_client_id"
    discordClientSecretKey: "discord_client_secret"
