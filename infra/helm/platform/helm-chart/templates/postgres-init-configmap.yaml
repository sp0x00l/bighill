apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bighill-platform.fullname" . }}-postgres-init-scripts
  labels:
    app: {{ include "bighill-platform.fullname" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-11"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
{{- $scripts := .Files.Glob "tmp/docker-entrypoint-initdb.d/*" }}
{{- if $scripts }}
{{- range $path, $_ := $scripts }}
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- else }}
  noop.sh: |-
    #!/usr/bin/env sh
    echo "No postgres init scripts were packaged into this chart."
{{- end }}
