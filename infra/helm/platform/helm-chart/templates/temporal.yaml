{{- if .Values.temporal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  labels:
    app: temporal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      containers:
        - name: temporal
          image: "{{ .Values.temporal.image.repository }}:{{ .Values.temporal.image.tag }}"
          imagePullPolicy: {{ .Values.temporal.image.pullPolicy }}
          args:
            - "server"
            - "start-dev"
            - "--ip"
            - "0.0.0.0"
            - "--namespace"
            - {{ .Values.temporal.namespace | quote }}
          ports:
            - name: grpc
              containerPort: 7233
            - name: ui
              containerPort: 8233
          resources:
            {{- toYaml .Values.temporal.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  labels:
    app: temporal
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: {{ .Values.temporal.service.grpcPort }}
      targetPort: grpc
    - name: ui
      port: {{ .Values.temporal.service.uiPort }}
      targetPort: ui
  selector:
    app: temporal
{{- end }}
