apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "data-stream-service.fullname" . }}
  labels:
    app: {{ include "data-stream-service.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "data-stream-service.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "data-stream-service.fullname" . }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ .Values.serviceAccount.name | default "data-stream-service" }}
      {{- end }}
      containers:
        - name: {{ include "data-stream-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: {{ .Values.env.environment | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.otelExporterEndpoint | quote }}
            - name: DATA_STREAM_SERVICE_NAME
              value: {{ .Values.env.serviceName | quote }}
            - name: DATA_STREAM_API_GRPC_HOST
              value: "0.0.0.0"
            - name: DATA_STREAM_API_GRPC_PORT
              value: {{ .Values.service.grpcPort | quote }}
            - name: DATA_STREAM_QUERY_ENGINE_MODE
              value: {{ .Values.env.queryEngineMode | quote }}
            - name: DATA_STREAM_QUERY_ENGINE_DATA_ROOT
              value: {{ .Values.env.queryEngineDataRoot | quote }}
            - name: DATA_STREAM_QUERY_ENGINE_BINARY_PATH
              value: {{ .Values.env.queryEngineBinaryPath | quote }}
            - name: DATA_STREAM_QUERY_ENGINE_TIMEOUT_SECONDS
              value: {{ .Values.env.queryEngineTimeoutSeconds | quote }}
            - name: DATA_STREAM_DATA_REGISTRY_GRPC_ADDRESS
              value: {{ .Values.env.dataRegistryGrpcAddress | quote }}
            - name: DATA_STREAM_DATA_REGISTRY_GRPC_DIAL_TIMEOUT_MS
              value: {{ .Values.env.dataRegistryGrpcDialTimeoutMs | quote }}
            - name: DATA_STREAM_DATA_REGISTRY_GRPC_CALL_TIMEOUT_MS
              value: {{ .Values.env.dataRegistryGrpcCallTimeoutMs | quote }}
            - name: DATA_STREAM_DATA_REGISTRY_GRPC_RETRY_COUNT
              value: {{ .Values.env.dataRegistryGrpcRetryCount | quote }}
            - name: KAFKA_BROKER
              value: {{ .Values.env.kafkaBroker | quote }}
            - name: DATA_STREAM_SERVICE_KAFKA_GROUP_ID
              value: {{ .Values.env.kafkaGroupId | quote }}
            - name: DATA_STREAM_SERVICE_DLQ
              value: {{ .Values.env.dlq | quote }}
            - name: DATA_STREAM_SERVICE_OUTBOX
              value: {{ .Values.env.outbox | quote }}
            - name: DATA_STREAM_SERVICE_OUTBOX_RELAY_POLL_MS
              value: {{ .Values.env.outboxRelayPollMs | quote }}
            - name: DATA_STREAM_SERVICE_OUTBOX_RELAY_BATCH_SIZE
              value: {{ .Values.env.outboxRelayBatchSize | quote }}
            - name: DATA_STREAM_SERVICE_OUTBOX_RELAY_FAILURE_BACKOFF_MS
              value: {{ .Values.env.outboxRelayFailureBackoffMs | quote }}
            - name: DATA_STREAM_HEALTHCHECK_CPU_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckCpuThreshold | quote }}
            - name: DATA_STREAM_HEALTHCHECK_FREE_MEM_THRESHOLD_PERCENT
              value: {{ .Values.env.healthcheckFreeMemThreshold | quote }}
            - name: DATA_STREAM_HEALTHCHECK_PORT
              value: {{ .Values.service.healthPort | quote }}
            - name: DATA_STREAM_HEALTHCHECK_SERVICE_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckServiceLatencyThreshold | quote }}
            - name: DATA_STREAM_HEALTHCHECK_MSG_BROKER_LATENCY_THRESHOLD_SECONDS
              value: {{ .Values.env.healthcheckMessageBrokerLatencyThreshold | quote }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}
          startupProbe:
            httpGet:
              path: /health
              port: health
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
