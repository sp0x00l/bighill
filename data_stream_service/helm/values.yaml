replicaCount: 1
image:
  repository: "data-stream-service"
  tag: "0.0.1"
  pullPolicy: IfNotPresent
serviceAccount:
  create: false
  name: "data-stream-service"
  annotations: {}
service:
  type: ClusterIP
  grpcPort: 7070
  healthPort: 5050
ingress:
  enabled: false
  host: ""
  certificateArn: ""
env:
  environment: "local-dev"
  serviceName: "data-stream-service"
  otelExporterEndpoint: "http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318"
  kafkaBroker: "kafka:9092"
  kafkaGroupId: "data-stream-group"
  dlq: "http://localhost:4566/data-stream-dev-env-queue/"
  outbox: "postgres"
  outboxRelayPollMs: "250"
  outboxRelayBatchSize: "100"
  outboxRelayFailureBackoffMs: "2000"
  flightAuthToken: ""
  flightAllowAnonymous: "true"
  flightTlsCertPath: ""
  flightTlsKeyPath: ""
  flightTlsClientCaCertPath: ""
  flightTlsRequireClientCert: "false"
  queryEngineMode: "hybrid"
  queryEngineDataRoot: "tmp/local_s3_storage"
  queryEngineBinaryPath: "/usr/local/bin/datafusion_query_engine"
  queryEngineTimeoutSeconds: "30"
  dataRegistryGrpcAddress: "data-registry-service:7071"
  dataRegistryGrpcDialTimeoutMs: "500"
  dataRegistryGrpcCallTimeoutMs: "15000"
  dataRegistryGrpcRetryCount: "3"
  polarisBaseUrl: "http://polaris-catalog:8181"
  polarisCatalog: "bighill"
  polarisWarehouse: "s3://bighill-mlops-lakehouse/"
  polarisCredential: ""
  polarisToken: ""
  polarisCredentialsSecret:
    name: "polaris-client-credentials"
    credentialKey: "credential"
    tokenKey: "token"
  polarisScope: "PRINCIPAL_ROLE:ALL"
  polarisStorageEndpoint: "http://polaris-object-store:9000"
  polarisStorageAccessKeyId: "polaris_root"
  polarisStorageSecretAccessKey: "polaris_pass"
  polarisStorageRegion: "eu-west-1"
  polarisStoragePathStyle: "true"
  healthcheckCpuThreshold: "80"
  healthcheckFreeMemThreshold: "20"
  healthcheckServiceLatencyThreshold: "5"
  healthcheckMessageBrokerLatencyThreshold: "5"
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "768Mi"
    cpu: "400m"
